name: Security — SAST & SCA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan on Monday 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan (OWASP + security-audit)
        # continue-on-error removed — real findings should block the workflow.
        # SEMGREP_APP_TOKEN is optional; semgrep runs in local mode when absent.
        run: |
          semgrep ci \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/python \
            --sarif-output semgrep.sarif \
            --no-autofix
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()   # upload even if scan found issues (to populate Security tab)
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true  # SARIF upload may fail if file is missing; scan result is authoritative

  bandit-safety:
    name: Bandit Python SAST + Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bandit Python SAST
        run: pip install bandit && bandit -r backend/app/ -ll -ii --skip B101,B104,B601
        # -ll = medium+ severity, -ii = medium+ confidence
        # Skip: B101=assert, B104=bind-all-interfaces (false-positive in IP validation), B601=shell

      - name: Safety dependency check
        run: pip install safety && safety check --ignore=70612
        continue-on-error: true  # Only reporting, not blocking

      - name: npm audit
        working-directory: apps/web
        run: npm audit --audit-level=moderate
        continue-on-error: true  # Only reporting

  osv-scanner:
    name: OSV Scanner (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OSV Scanner (npm + python lockfiles)
        uses: google/osv-scanner-action@v1.9.2
        with:
          # exit-code 1 = vulnerabilities found (blocking), >1 = scanner error
          scan-args: |-
            --lockfile=package-lock.json
            --lockfile=apps/web/package-lock.json
            --lockfile=frameworks/cortex-java/python_server/requirements.txt

  trivy-container:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build -t cortex-scan:${{ github.sha }} .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'cortex-scan:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'   # fail the job when CRITICAL/HIGH vulns are found

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
