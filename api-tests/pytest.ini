[pytest]
testpaths = tests
markers =
    smoke: Smoke tests
    critical: Critical path tests
    auth: Authentication tests
    datasets: Dataset CRUD tests
    scenarios: Scenario tests
    executions: Execution tests
    ai: AI-powered endpoint tests
    security: Security tests
    engine: Engine (Flask) tests
    negative: Negative test cases
    boundary: Boundary value tests
    schedules: TSPM schedule CRUD + trigger tests
    integrations: TSPM integration CRUD + sync stub contract tests
    approvals: TSPM approval flow (decide) tests
addopts = -v --tb=short --strict-markers
