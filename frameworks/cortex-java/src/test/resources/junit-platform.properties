# =====================================================
#  Cortex Otomasyon - Cucumber JUnit Platform config
# =====================================================
# Loaded automatically from the classpath. Every value here can be
# overridden via -D system properties on the Maven CLI.

# Glue packages (Cucumber step defs)
cucumber.glue=playwright.stepdefs,listeners

# Default tag filter: full regression, excluding manual/skip
cucumber.filter.tags=not @manual and not @skip

# Snippet style for unmatched steps
cucumber.snippet-type=camelcase

# Plugins / reporting
cucumber.plugin=pretty,\
  summary,\
  html:target/cucumber-report.html,\
  json:target/cucumber.json,\
  junit:target/cucumber-junit.xml,\
  rerun:target/failed.txt,\
  io.qameta.allure.cucumber7jvm.AllureCucumber7Jvm

# --- Parallel execution (overridden by -Pparallel profile) ---
cucumber.execution.parallel.enabled=false
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=4
cucumber.execution.parallel.mode.default=concurrent
cucumber.execution.parallel.mode.classes.default=concurrent

# --- JUnit Jupiter (just in case extra tests get added) ---
junit.jupiter.execution.parallel.enabled=false
