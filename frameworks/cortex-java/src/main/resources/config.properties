# =====================================================
#  Cortex Otomasyon - Configuration
# =====================================================
#  Hassas degerler (aes.key, passwords) .env'den okunur.
#  Cozunurluk: -D > env > .env > bu dosya
# =====================================================

# --- Browser ---
browser=chrome
browser.headless=false
browser.window.width=1920
browser.window.height=1080

# --- Cortex (aktif hedef sistem) ---
base.url=https://cortex-test.bgtsai.com/
cortex.url=https://cortex-test.bgtsai.com/
cortex.login.url=https://cortex-test.bgtsai.com/login
cortex.logout.url=https://cortex-test.bgtsai.com/logout
cortex.dashboard.url=https://cortex-test.bgtsai.com/dashboard
cortex.api.base.url=https://cortex-test.bgtsai.com/api
cortex.forgot.password.url=https://cortex-test.bgtsai.com/forgot-password

# --- Cortex test credentials (sifreli alias) ---
# Kullanim feature'da: 'I write "${ENV:CORTEX_USERNAME}" into "userNameInput"'
# Sifre alias: 'I enter encrypted password alias "cortexUser" into "passwordInput"'
cortex.username.alias=cortexUser
cortex.username.invalid=invalid_user_does_not_exist
cortex.password.invalid=wrongPassword123

# --- Timeouts (seconds) ---
timeout.implicit=10
timeout.explicit=15
timeout.pageLoad=60
timeout.short=3

# --- Database (opsiyonel, Cortex DB ile entegrasyon icin) ---
db1.url=jdbc:sqlserver://${ENV:DB1_HOST:127.0.0.1}:${ENV:DB1_PORT:1433};databaseName=${ENV:DB1_NAME:Cortex};encrypt=false;trustServerCertificate=true
db1.username=${ENV:DB1_USERNAME:cortex_test}

# --- AI Suggestion service (dashboard) ---
ai.service.url=http://localhost:5001
ai.dashboard.url=http://localhost:5001

# --- Playwright ---
playwright.browser=chromium
playwright.headless=false
playwright.slow.mo=0
playwright.viewport.width=1440
playwright.viewport.height=900
playwright.timeout.ms=15000
playwright.video=false
playwright.trace=false

# --- Encryption ---
# .env'de mutlaka ayarlanmali: CORTEX_AES_KEY=<16 karakter>
aes.key=${ENV:CORTEX_AES_KEY:}
