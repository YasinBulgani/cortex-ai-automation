# =====================================================
#  Cortex Recorder - default settings
#  Override from IntelliJ Run > Recorder via -D flags.
# =====================================================

# URL the recorder opens on start
recorder.url=https://cortex-test.bgtsai.com/

# Local HTTP server port
recorder.port=7700

# Where the .feature + locator JSON files get written
# (relative to the project root)
recorder.output.dir=src/test/resources/recordings

# Leave blank to auto-name as recorded_yyyyMMdd_HHmmss
recorder.feature.name=

# Browser engine: chromium | firefox | webkit
recorder.browser=chromium

# Headless mode
recorder.headless=false

# Whether to navigate to the URL on start
recorder.auto.open=true

# Viewport
recorder.viewport.width=1440
recorder.viewport.height=900
