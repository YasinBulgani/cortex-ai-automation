# E23/E28 — CI profile (used by .github/workflows/cortex-recorder-tests.yml)
# Activated automatically by env var CORTEX_ENV=ci set in the workflow.
#
# Goal: tests run against a stable, locally-mocked stack inside the runner.
# No external dependencies — failures must be deterministic, not flaky.

base_url=http://localhost:3000
api_url=http://127.0.0.1:5001
ollama_url=http://127.0.0.1:11434

# CI account fixtures — injected by the workflow via OS env when present
test_username=
test_email=

# Feature flags pinned to "as-shipped" defaults — CI proves the matrix that
# real users see, not experimental toggles.
feature_new_dashboard=true
feature_recorder_v2=true

# Generous timeouts for cold-started CI runners
default_timeout_ms=60000
