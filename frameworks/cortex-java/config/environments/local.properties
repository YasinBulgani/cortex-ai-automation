# E23 — Local development profile
# Loaded by playwright.EnvironmentConfig when:
#   - JVM flag is absent, or
#   - -Dcortex.env=local
#
# Use lower-case keys; placeholders in .feature files are case-insensitive:
#   ${ENV:base_url}  →  reads base_url here
#   ${ENV:BASE_URL}  →  same value
#
# Secret values (API keys, passwords) belong in the OS env, NOT in this file.
# resolveEnv falls back to System.getenv() for anything missing here.

base_url=http://localhost:3000
api_url=http://127.0.0.1:5001
ollama_url=http://127.0.0.1:11434

# Test user fixtures — public-only credentials for the local stack
test_username=qa@example.local
test_email=qa@example.local

# Feature flags
feature_new_dashboard=true
feature_recorder_v2=true

# Wait budgets (ms) — overrides for slow local hardware
default_timeout_ms=30000
