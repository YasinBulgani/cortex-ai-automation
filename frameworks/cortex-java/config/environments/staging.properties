# E23 — Staging environment profile
# Activate with: mvn test -Dcortex.env=staging

base_url=https://cortex-staging.bgtsai.com
api_url=https://api-staging.bgtsai.com
ollama_url=http://127.0.0.1:11434

# Test user — fill these in from your secret store BEFORE first run;
# leaving them empty causes ${ENV:test_username} to expand to the OS env.
test_username=
test_email=

# Feature flags as deployed to staging
feature_new_dashboard=true
feature_recorder_v2=true

# Slightly longer waits for cross-region latency
default_timeout_ms=45000
