# E23 — Production profile (read-only smoke tests only!)
# Activate with: mvn test -Dcortex.env=prod
#
# WARNING: any destructive scenarios (DELETE, account create, etc.) MUST be
# tagged @no-prod and excluded from the suite. There is no rollback for prod.

base_url=https://cortex.bgtsai.com
api_url=https://api.bgtsai.com
ollama_url=http://127.0.0.1:11434

# Prod has no shared QA user — every CI run pulls a fresh OTP-backed account.
# Keep these blank; CI injects via OS env (CORTEX_PROD_USER, CORTEX_PROD_EMAIL).
test_username=
test_email=

# Production flag set (do not assume parity with staging)
feature_new_dashboard=true
feature_recorder_v2=false

# Conservative timeouts — prod backends are highly cached but DNS can wobble
default_timeout_ms=60000
