name: On-Demand Tests

on:
  workflow_dispatch:
    inputs:
      test_scope:
        description: "Test kapsamı"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - smoke
          - regression
          - api

concurrency:
  group: bgts-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  PYTHON_BIN: "python3"
  TESTING: "true"
  HEADLESS: "true"
  TEST_ENV: "ci"
  DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
  REDIS_URL: redis://localhost:6379/0
  ENGINE_CORS_ORIGINS: http://127.0.0.1:3417,http://localhost:3417
  APP_PORT: "3417"
  API_PORT: "8875"
  ENGINE_PORT: "5001"
  NEXT_PUBLIC_API_BASE: http://127.0.0.1:8875
  NEXT_PUBLIC_ENGINE_BASE: http://127.0.0.1:5001
  NEXT_PUBLIC_ENGINE_URL: http://127.0.0.1:5001

jobs:
  e2e:
    name: "Playwright E2E"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: syndata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            engine/requirements.txt

      - name: Generate runtime secrets
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import secrets
          print(f"JWT_SECRET={secrets.token_urlsafe(72)}")
          print(f"ENGINE_SECRET_KEY={secrets.token_urlsafe(48)}")
          print(f"ENGINE_INTERNAL_KEY={secrets.token_urlsafe(48)}")
          PY

      - name: Install root and web dependencies
        run: |
          npm ci
          npm ci --prefix apps/web

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
          pip install -r engine/requirements.txt

      - name: Prepare database
        working-directory: backend
        run: |
          PYTHONPATH=. alembic upgrade head
          PYTHONPATH=. python scripts/seed.py

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build web app
        run: npm run build --prefix apps/web

      - name: Start application services
        run: |
          sh scripts/start-backend-ci.sh > /tmp/bgts-backend.log 2>&1 &
          sh scripts/start-engine-ci.sh > /tmp/bgts-engine.log 2>&1 &
          sh scripts/start-web-ci.sh > /tmp/bgts-web.log 2>&1 &

      - name: Wait for application services
        run: |
          sh scripts/wait-for-http.sh "http://127.0.0.1:${API_PORT}/health" 45 2
          sh scripts/wait-for-http.sh "http://127.0.0.1:${ENGINE_PORT}/health" 45 2
          sh scripts/wait-for-http.sh "http://127.0.0.1:${APP_PORT}" 60 2

      - name: Run E2E suite
        run: |
          SCOPE="${{ github.event.inputs.test_scope || 'all' }}"
          case "$SCOPE" in
            smoke) PROJECT="smoke" ;;
            regression) PROJECT="regression" ;;
            api) PROJECT="service" ;;
            *) PROJECT="full" ;;
          esac
          echo "Running Playwright project: $PROJECT"
          npx playwright test --project="$PROJECT"
        env:
          CI: "true"
          PLAYWRIGHT_DISABLE_WEBSERVER: "1"

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bgts-e2e-report
          path: |
            reports/e2e-html/
            reports/e2e-artifacts/
            reports/e2e-results.json
            reports/e2e-junit.xml

      - name: Collect service logs
        if: always()
        run: |
          mkdir -p reports/ci-logs
          cp /tmp/bgts-backend.log reports/ci-logs/backend.log 2>/dev/null || true
          cp /tmp/bgts-engine.log reports/ci-logs/engine.log 2>/dev/null || true
          cp /tmp/bgts-web.log reports/ci-logs/web.log 2>/dev/null || true

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bgts-service-logs
          path: reports/ci-logs/
