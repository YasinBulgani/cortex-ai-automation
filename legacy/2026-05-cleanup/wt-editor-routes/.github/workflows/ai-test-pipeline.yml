name: AI-Enhanced Test Pipeline

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_full:
        description: 'Full regression çalıştır'
        required: false
        default: 'false'

concurrency:
  group: ai-test-${{ github.ref }}
  cancel-in-progress: true

env:
  TEST_ENV: ci
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test

jobs:
  # ── Faz 1: AI Test Prioritization ─────────────────────────────────────
  prioritize:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      selected-tests: ${{ steps.prio.outputs.tests }}
      time-saved: ${{ steps.prio.outputs.time_saved }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install engine deps
        run: pip install -r engine/requirements.txt

      - name: AI Test Prioritization
        id: prio
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
          OUTPUT=$(python scripts/ai_test_selector.py \
            --changed-files "$CHANGED" \
            --output-format json \
            --threshold 0.25)
          TESTS=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps([t['name'] for t in d['selected']]))")
          SAVED=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['time_saved_pct'])")
          echo "tests=$TESTS" >> $GITHUB_OUTPUT
          echo "time_saved=$SAVED" >> $GITHUB_OUTPUT
          echo "Selected tests: $TESTS"
          echo "Time saved: $SAVED%"

  # ── Faz 2: Sentetik Veri Üretimi ──────────────────────────────────────
  prepare-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install faker

      - name: Generate synthetic test data
        working-directory: engine
        run: |
          python -c "
          import json, sys
          sys.path.insert(0, '.')
          try:
              from ai_synthetic_data.generators.banking_generator import BankingSyntheticGenerator
              gen = BankingSyntheticGenerator(seed=42)
              data = gen.generate_dataset(customer_count=50)
              with open('test_data/synthetic_dataset.json', 'w') as f:
                  json.dump(data, f, indent=2, ensure_ascii=False)
              c, a, t = len(data['customers']), len(data['accounts']), len(data['transactions'])
              print(f'Uretildi: {c} musteri, {a} hesap, {t} islem')
          except ImportError:
              print('Banking generator not available, skipping')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: synthetic-data
          path: engine/test_data/synthetic_dataset.json
          if-no-files-found: ignore

  # ── Faz 3: Smoke Tests ────────────────────────────────────────────────
  smoke:
    needs: [prepare-data]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: syndata_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          cd apps/web && npm ci
          cd ../../backend && pip install -r requirements.txt
          cd ../engine && pip install -r requirements.txt

      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: .pw-browsers

      - uses: actions/download-artifact@v4
        with:
          name: synthetic-data
          path: engine/test_data/
        continue-on-error: true

      - name: Migrate database
        run: cd backend && PYTHONPATH=. python -m alembic upgrade head
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed database
        run: cd backend && PYTHONPATH=. python scripts/seed.py
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run smoke tests
        run: npm run test:e2e:smoke
        env:
          CI: "true"
          PLAYWRIGHT_BROWSERS_PATH: .pw-browsers

      - name: Self-healing retry on failure
        if: failure()
        run: npm run test:e2e:smoke -- --retries=1
        env:
          CI: "true"
          PLAYWRIGHT_BROWSERS_PATH: .pw-browsers

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: reports/

  # ── Faz 4: Nightly Full Suite ─────────────────────────────────────────
  nightly-full:
    if: github.event_name == 'schedule' || github.event.inputs.run_full == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: syndata_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          cd apps/web && npm ci
          cd ../../backend && pip install -r requirements.txt
          cd ../engine && pip install -r requirements.txt

      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: .pw-browsers

      - name: Migrate database
        run: cd backend && PYTHONPATH=. python -m alembic upgrade head
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed database
        run: cd backend && PYTHONPATH=. python scripts/seed.py
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Full E2E suite
        run: npm run test:e2e:full
        env:
          CI: "true"
          PLAYWRIGHT_BROWSERS_PATH: .pw-browsers

      - name: Backend tests with coverage
        run: cd backend && python -m pytest --cov=app --cov-report=term-missing -v

      - name: Engine unit tests
        run: cd engine && python -m pytest tests/unit/ -m 'not ai' -v --tb=short

      - name: Flaky test analysis
        if: always()
        working-directory: engine
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from services.flaky_detector import FlakyDetector
          d = FlakyDetector()
          results = d.analyze_all()
          q = [t for t in results if t.recommendation == 'quarantine']
          print(f'Analiz: {len(results)} test, {len(q)} karantinada')
          d.save_report()
          "

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-report
          path: reports/

  # ── Faz 5: Post-Test Analysis & Feedback Loop ─────────────────────────
  analyze:
    if: always() && needs.smoke.result != 'skipped'
    needs: [smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - run: pip install -r engine/requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: smoke-report
          path: reports/
        continue-on-error: true

      - name: Update learning DB from test results
        run: |
          python scripts/update_learning_db.py \
            --report reports/e2e-results.json \
            --optimize || echo "No test results to process"

      - name: Anomaly detection
        working-directory: engine
        run: |
          python -c "
          import sys, json, os; sys.path.insert(0, '.')
          from services.anomaly_detector import AnomalyDetector
          d = AnomalyDetector()
          report_path = '../reports/e2e-results.json'
          if os.path.exists(report_path):
              with open(report_path) as f:
                  raw = json.load(f)
              stats = raw.get('stats', {})
              results = {
                  'total': stats.get('expected', 50),
                  'passed': stats.get('expected', 50) - stats.get('unexpected', 0),
                  'failed': stats.get('unexpected', 0),
                  'total_duration': stats.get('duration', 0) / 1000,
                  'avg_duration': (stats.get('duration', 0) / max(stats.get('expected', 1), 1)) / 1000,
              }
          else:
              results = {'total': 0, 'passed': 0, 'failed': 0, 'total_duration': 0, 'avg_duration': 0}
              print('No report found, skipping anomaly detection')
          anomalies = d.analyze_test_run(results)
          if anomalies:
              print('ANOMALY TESPIT EDILDI:')
              for a in anomalies:
                  print(f'  [{a.severity}] {a.description}')
          else:
              print('Anomaly yok -- sonuclar normal.')
          "

      - name: Generate AI report
        run: python scripts/ai_report_generator.py --output-dir reports/

      - uses: actions/upload-artifact@v4
        with:
          name: ai-test-report
          path: reports/
