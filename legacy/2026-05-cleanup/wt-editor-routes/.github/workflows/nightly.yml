name: Nightly Full Suite

on:
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run"
        required: true
        default: "full"
        type: choice
        options: [smoke, regression, full, service]
      notify:
        description: "Send failure notification"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
  REDIS_URL: redis://localhost:6379/0

jobs:
  runtime-contracts:
    name: "Runtime Contracts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Validate runtime configuration contracts
        run: |
          python - <<'PY'
          from pathlib import Path

          dockerfile_first_line = Path("backend/Dockerfile").read_text(encoding="utf-8").splitlines()[0].strip()
          if dockerfile_first_line != "FROM python:3.12-slim-bookworm":
              raise SystemExit(f"backend/Dockerfile python runtime drift detected: {dockerfile_first_line}")

          prod_compose = Path("docker-compose.prod.yml").read_text(encoding="utf-8")
          required_tokens = [
              'RATE_LIMIT_REQUIRED: "true"',
              'REDIS_REQUIRED: "true"',
              'AUTH_STATE_REDIS_REQUIRED: "true"',
              'LLM_RATE_LIMIT_REDIS_REQUIRED: "true"',
              'CICD_REQUIRE_WEBHOOK_SECRETS: "true"',
              'N8N_REQUIRE_CALLBACK_SECRET: "true"',
              'WEBHOOK_REQUIRE_SECRETS: "true"',
              'ENGINE_DEBUG: "0"',
              'ENGINE_CORS_ORIGINS: ${ENGINE_CORS_ORIGINS}',
          ]
          missing = [token for token in required_tokens if token not in prod_compose]
          if missing:
              raise SystemExit("docker-compose.prod.yml strict runtime flags missing: " + ", ".join(missing))

          workflow_dir = Path(".github/workflows")
          floating_refs = []
          for workflow_file in workflow_dir.glob("*.yml"):
              for idx, line in enumerate(workflow_file.read_text(encoding="utf-8").splitlines(), start=1):
                  if "uses:" not in line:
                      continue
                  if "@master" in line or "@main" in line:
                      floating_refs.append(f"{workflow_file}:{idx}:{line.strip()}")

          if floating_refs:
              raise SystemExit(
                  "Floating GitHub Action ref detected. Pin to immutable tag/SHA:\n"
                  + "\n".join(floating_refs)
              )
          PY
      - name: Run runtime hardening tests
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
          cd backend
          pytest tests/security/test_config_hardening.py tests/test_runtime_lifecycle.py -q

  backend-full:
    name: "Backend Full Suite"
    runs-on: ubuntu-latest
    needs: runtime-contracts
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: syndata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - run: |
          PYTHONPATH=. alembic upgrade head
          PYTHONPATH=. python scripts/seed.py
          pytest --cov=app --cov-report=html:../reports/backend-coverage-html --cov-report=xml:../reports/backend-coverage.xml --junit-xml=../reports/backend-full.xml -v
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          TESTING: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-full-results
          path: reports/

  engine-full:
    name: "Engine Full Suite"
    runs-on: ubuntu-latest
    needs: runtime-contracts
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short -m "not ai" --junit-xml=../reports/engine-full.xml
        env:
          HEADLESS: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-full-results
          path: reports/engine-full.xml

  e2e-full:
    name: "E2E Full Suite"
    runs-on: ubuntu-latest
    needs: [backend-full, engine-full]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: syndata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Generate runtime secrets
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import secrets
          print(f"JWT_SECRET={secrets.token_urlsafe(72)}")
          print(f"ENGINE_SECRET_KEY={secrets.token_urlsafe(48)}")
          print(f"ENGINE_INTERNAL_KEY={secrets.token_urlsafe(48)}")
          PY
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: |
          cd backend && pip install -r requirements.txt
          PYTHONPATH=. alembic upgrade head
          PYTHONPATH=. python scripts/seed.py
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - run: npm ci
        working-directory: apps/web
      - run: npx playwright test --project=${{ github.event.inputs.suite || 'full' }}
        env:
          TEST_ENV: ci
          CI: "true"
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          ENGINE_CORS_ORIGINS: http://127.0.0.1:3417,http://localhost:3417
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-full-results
          path: |
            reports/e2e-html/
            reports/e2e-artifacts/
            reports/e2e-results.json
            reports/e2e-junit.xml

  k6-load-test:
    name: "k6 Load Test"
    runs-on: ubuntu-latest
    needs: runtime-contracts
    if: github.event_name == 'schedule'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: syndata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Setup and start backend
        run: |
          cd backend
          pip install -r requirements.txt
          PYTHONPATH=. alembic upgrade head
          PYTHONPATH=. python scripts/seed.py
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/health || exit 1
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ci-perf-secret
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Run load test
        run: k6 run --out json=reports/k6-results.json tests/performance/load_test.js
        env:
          API_BASE: http://localhost:8000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: reports/k6-results.json

  notify-failure:
    name: "Failure Notification"
    runs-on: ubuntu-latest
    needs: [e2e-full]
    if: failure() && (github.event_name != 'workflow_dispatch' || github.event.inputs.notify == 'true')
    steps:
      - name: Send notification
        run: |
          WEBHOOK_URL="${{ secrets.WEBHOOK_SLACK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then
            WEBHOOK_URL="${{ secrets.WEBHOOK_TEAMS_URL }}"
          fi
          if [ -n "$WEBHOOK_URL" ]; then
            curl -sS -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \"Nightly regression failed on ${{ github.ref_name }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }"
          fi
