name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    strategy:
      matrix:
        include:
          - service: backend
            context: backend
            dockerfile: backend/Dockerfile
          - service: engine
            context: engine
            dockerfile: engine/Dockerfile
          - service: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
          - service: ai-gateway
            context: ai-gateway
            dockerfile: ai-gateway/Dockerfile

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ vars.STAGING_ENVIRONMENT || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST \
            "cd $DEPLOY_PATH && \
             docker compose -f docker-compose.prod.yml up -d postgres redis && \
             GITHUB_REPOSITORY=${{ github.repository }} IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml pull backend worker engine web ai-gateway && \
             GITHUB_REPOSITORY=${{ github.repository }} IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml run --rm -e SKIP_APP_BOOTSTRAP=1 backend alembic upgrade head && \
             GITHUB_REPOSITORY=${{ github.repository }} IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml run --rm -e SKIP_APP_BOOTSTRAP=1 backend python -c 'from app.config import settings; assert settings.is_production_like' && \
             GITHUB_REPOSITORY=${{ github.repository }} IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml up -d --remove-orphans"

      - name: Staging health check
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
        run: |
          for i in {1..24}; do
            if curl --fail --silent --show-error "https://$DEPLOY_HOST/health" \
              && curl --fail --silent --show-error "https://$DEPLOY_HOST/ready"; then
              if curl --fail --silent --show-error "https://$DEPLOY_HOST/openapi.json" >/dev/null 2>&1; then
                echo "OpenAPI endpoint should be disabled in staging/prod"
                exit 1
              fi
              if curl --fail --silent --show-error "https://$DEPLOY_HOST/docs" >/dev/null 2>&1; then
                echo "Docs endpoint should be disabled in staging/prod"
                exit 1
              fi
              echo "Staging health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: ${{ vars.PRODUCTION_ENVIRONMENT || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Request approval
        run: echo "Waiting for manual approval to deploy to production..."

      - name: Deploy to production
        env:
          DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST \
            "cd $DEPLOY_PATH && \
             docker compose -f docker-compose.prod.yml up -d postgres redis && \
             GITHUB_REPOSITORY=${{ github.repository }} IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml pull backend worker engine web ai-gateway && \
             GITHUB_REPOSITORY=${{ github.repository }} IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml run --rm -e SKIP_APP_BOOTSTRAP=1 backend alembic upgrade head && \
             GITHUB_REPOSITORY=${{ github.repository }} IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml run --rm -e SKIP_APP_BOOTSTRAP=1 backend python -c 'from app.config import settings; assert settings.is_production_like' && \
             GITHUB_REPOSITORY=${{ github.repository }} IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml up -d --remove-orphans"

      - name: Health check
        env:
          DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
        run: |
          for i in {1..30}; do
            if curl --fail --silent --show-error "https://$DEPLOY_HOST/health" \
              && curl --fail --silent --show-error "https://$DEPLOY_HOST/ready"; then
              if curl --fail --silent --show-error "https://$DEPLOY_HOST/openapi.json" >/dev/null 2>&1; then
                echo "OpenAPI endpoint should be disabled in production"
                exit 1
              fi
              if curl --fail --silent --show-error "https://$DEPLOY_HOST/docs" >/dev/null 2>&1; then
                echo "Docs endpoint should be disabled in production"
                exit 1
              fi
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for service to be healthy..."
            sleep 10
          done
          echo "Health check failed"
          exit 1
