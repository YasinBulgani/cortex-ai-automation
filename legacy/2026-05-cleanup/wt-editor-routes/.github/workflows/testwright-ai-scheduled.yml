name: TestwrightAI Scheduled Regression

on:
  schedule:
    # Hafta içi her gün 02:00 UTC (Türkiye saati 05:00)
    - cron: "0 2 * * 1-5"
  workflow_dispatch:
    inputs:
      notify:
        description: "Bildirim gönder"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: testwright-ai-scheduled
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  TESTING: "true"
  HEADLESS: "true"
  TEST_ENV: "ci"
  BASE_URL: "http://localhost:3000"
  API_URL: "http://localhost:8000/api/v1"
  ENGINE_URL: "http://localhost:5001"

jobs:
  full-regression:
    name: "🌙 TestwrightAI Zamanlanmış Regresyon"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: twai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            engine/requirements.txt
            backend/requirements.txt

      - name: Install engine dependencies
        working-directory: engine
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-xdist pytest-rerunfailures

      - name: Install Playwright
        working-directory: engine
        run: python -m playwright install chromium --with-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('engine/requirements.txt') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start backend
        working-directory: backend
        run: |
          python -m flask run --host=0.0.0.0 --port=8000 &
          sleep 5
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/twai_test
          REDIS_URL: redis://localhost:6379/0
          FLASK_APP: app:create_app

      - name: Start engine
        working-directory: engine
        run: |
          python -m flask run --host=0.0.0.0 --port=5001 &
          sleep 3
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/twai_test

      - name: Run full regression suite
        id: regression
        working-directory: engine
        run: |
          python bgts_runner.py --regression --parallel 4 --retry 2 --report --json-output ../reports/testwright-ai-scheduled-results.json
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/twai_test
          REDIS_URL: redis://localhost:6379/0
        continue-on-error: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testwright-ai-scheduled-allure-${{ github.run_number }}
          path: engine/allure-results/
          retention-days: 30

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testwright-ai-scheduled-reports-${{ github.run_number }}
          path: |
            engine/reports/
            engine/allure-report/
            reports/
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testwright-ai-scheduled-screenshots-${{ github.run_number }}
          path: engine/screenshots/
          retention-days: 14

      - name: Send failure notification
        if: steps.regression.outcome == 'failure'
        run: |
          WEBHOOK_URL="${{ secrets.WEBHOOK_SLACK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then
            WEBHOOK_URL="${{ secrets.WEBHOOK_TEAMS_URL }}"
          fi
          if [ -n "$WEBHOOK_URL" ]; then
            RESULT_FILE="reports/testwright-ai-scheduled-results.json"
            if [ -f "$RESULT_FILE" ]; then
              TOTAL=$(python3 -c "import json; d=json.load(open('$RESULT_FILE')); print(d.get('total',0))")
              PASSED=$(python3 -c "import json; d=json.load(open('$RESULT_FILE')); print(d.get('passed',0))")
              FAILED=$(python3 -c "import json; d=json.load(open('$RESULT_FILE')); print(d.get('failed',0))")
            else
              TOTAL="?"
              PASSED="?"
              FAILED="?"
            fi
            curl -sS -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \"❌ *TestwrightAI Zamanlanmış Regresyon Başarısız*\nToplam: $TOTAL | Başarılı: $PASSED | Başarısız: $FAILED\nBranch: ${{ github.ref_name }}\nKoşu: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }"
          fi

      - name: Generate GitHub summary
        if: always()
        run: |
          echo "## 🌙 TestwrightAI Zamanlanmış Regresyon Raporu" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tarih:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Durum:** ${{ steps.regression.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/testwright-ai-scheduled-results.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/testwright-ai-scheduled-results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
