name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # STAGE 1: Lint (paralel, hızlı geri bildirim)
  # ═══════════════════════════════════════════════════════════════════════════════
  backend-lint:
    name: "🔍 Backend Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install ruff mypy
      - run: ruff check app/
      - run: mypy app/ --strict --ignore-missing-imports
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # STAGE 2: Unit & Smoke Tests (paralel)
  # ═══════════════════════════════════════════════════════════════════════════════
  backend-smoke:
    name: "🩺 Backend Smoke"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: syndata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - run: pytest -m smoke --tb=short -v --junit-xml=../reports/backend-smoke.xml
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
          TESTING: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-smoke-results
          path: reports/backend-smoke.xml

  backend-service:
    name: "🔌 Backend Service Tests"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: syndata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - run: pytest --cov=app --cov-report=term-missing --cov-report=xml:../reports/backend-coverage.xml --cov-fail-under=50 --junit-xml=../reports/backend-service.xml -v
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
          TESTING: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-service-results
          path: |
            reports/backend-service.xml
            reports/backend-coverage.xml

  engine-unit:
    name: "⚙️ Engine Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/unit/ -v --tb=short -m "not ai" --junit-xml=../reports/engine-unit.xml
        env:
          HEADLESS: "true"
          TEST_ENV: "test"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-unit-results
          path: |
            reports/engine-unit.xml
            engine/reports/*.xlsx

  # ═══════════════════════════════════════════════════════════════════════════════
  # STAGE 2b: API + RBAC + Contract + Security Tests
  # ═══════════════════════════════════════════════════════════════════════════════
  backend-api-tests:
    name: "🧪 Backend API Tests"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: syndata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          PYTHONPATH=. alembic upgrade head
          PYTHONPATH=. python scripts/seed.py
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
      - name: API functional tests
        run: pytest tests/api/ -v --tb=short --junit-xml=../reports/backend-api.xml
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
          TESTING: "true"
      - name: RBAC matrix tests
        run: pytest tests/rbac/ -v --tb=short --junit-xml=../reports/backend-rbac.xml
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
          TESTING: "true"
      - name: Contract tests
        run: pytest tests/contract/ -v --tb=short --junit-xml=../reports/backend-contract.xml
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
          TESTING: "true"
      - name: Security tests
        run: pytest tests/security/ -v --tb=short --junit-xml=../reports/backend-security.xml
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
          TESTING: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-api-results
          path: |
            reports/backend-api.xml
            reports/backend-rbac.xml
            reports/backend-contract.xml
            reports/backend-security.xml

  # ═══════════════════════════════════════════════════════════════════════════════
  # STAGE 2.5: BDD API Tests (backend ayakta olunca calistir)
  # ═══════════════════════════════════════════════════════════════════════════════
  bdd-api:
    name: "🧪 BDD API Tests"
    runs-on: ubuntu-latest
    needs: [backend-smoke, engine-unit]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: syndata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            engine/requirements.txt
      - name: Install backend + seed
        run: |
          cd backend && pip install -r requirements.txt
          PYTHONPATH=. python scripts/seed.py
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
      - name: Start backend
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/health || exit 1
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
          JWT_SECRET: ci-test-secret
      - name: Install engine deps
        run: cd engine && pip install -r requirements.txt
      - name: Run BDD API tests
        run: |
          cd engine
          python -m pytest steps/api/ -v --tb=short \
            --alluredir=allure-results \
            --junit-xml=../reports/bdd-api.xml \
            -m "not ai"
        env:
          TWAI_API_URL: http://localhost:8000
          TEST_ENV: test
          HEADLESS: "true"
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bdd-api-results
          path: |
            reports/bdd-api.xml
            engine/allure-results/
            engine/reports/*.xlsx

  # ═══════════════════════════════════════════════════════════════════════════════
  # STAGE 3: E2E Tests (smoke → regression gate)
  # ═══════════════════════════════════════════════════════════════════════════════
  e2e-smoke:
    name: "💨 E2E Smoke"
    runs-on: ubuntu-latest
    needs: [backend-smoke, engine-unit]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: syndata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            engine/requirements.txt
      - name: Install root deps + Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps
      - name: Install backend deps + seed
        run: |
          cd backend
          pip install -r requirements.txt
          PYTHONPATH=. alembic upgrade head
          PYTHONPATH=. python scripts/seed.py
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
          JWT_SECRET: ci-test-secret
      - name: Install engine deps
        run: cd engine && pip install -r requirements.txt
      - name: Install web deps
        run: npm ci
        working-directory: apps/web
      - name: Run E2E smoke tests
        run: npx playwright test --project=smoke
        env:
          TEST_ENV: ci
          CI: "true"
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
          JWT_SECRET: ci-test-secret
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8765
          NEXT_PUBLIC_ENGINE_BASE: http://127.0.0.1:5001
          ENABLE_SELF_HEALING: "false"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-smoke-report
          path: |
            reports/e2e-html/
            reports/e2e-artifacts/

  e2e-regression:
    name: "🔄 E2E Regression"
    runs-on: ubuntu-latest
    needs: e2e-smoke
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-regression')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: syndata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            engine/requirements.txt
      - name: Install root deps + Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps
      - name: Install backend deps + seed
        run: |
          cd backend
          pip install -r requirements.txt
          PYTHONPATH=. alembic upgrade head
          PYTHONPATH=. python scripts/seed.py
        env:
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
          JWT_SECRET: ci-test-secret
      - name: Install engine deps
        run: cd engine && pip install -r requirements.txt
      - name: Install web deps
        run: npm ci
        working-directory: apps/web
      - name: Run E2E regression tests
        run: npx playwright test --project=regression
        env:
          TEST_ENV: ci
          CI: "true"
          DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/syndata_test
          JWT_SECRET: ci-test-secret
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8765
          NEXT_PUBLIC_ENGINE_BASE: http://127.0.0.1:5001
          ENABLE_SELF_HEALING: "false"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-regression-report
          path: |
            reports/e2e-html/
            reports/e2e-artifacts/
            reports/e2e-results.json

  # ═══════════════════════════════════════════════════════════════════════════════
  # STAGE 4: Allure Report (tum test sonuclarini birlestir)
  # ═══════════════════════════════════════════════════════════════════════════════
  allure-report:
    name: "📊 Allure Report"
    runs-on: ubuntu-latest
    needs: [engine-unit, backend-api-tests, bdd-api, e2e-smoke]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-results"
          path: all-results/
          merge-multiple: true
      - name: Collect allure results
        run: |
          mkdir -p merged-allure-results
          find all-results/ -name "*.json" -path "*/allure-results/*" -exec cp {} merged-allure-results/ \; 2>/dev/null || true
          find all-results/ -name "*.xml" -exec cp {} merged-allure-results/ \; 2>/dev/null || true
          ls -la merged-allure-results/ || echo "No allure results found"
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: merged-allure-results
          allure_history: allure-history
          keep_reports: 20
      - name: Publish Allure Report to Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always() && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-history/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: excel-reports
          path: |
            all-results/**/*.xlsx

  # ═══════════════════════════════════════════════════════════════════════════════
  # STAGE 5: Docker Build (tum testler gectikten sonra)
  # ═══════════════════════════════════════════════════════════════════════════════
  docker-build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [backend-service, backend-api-tests, engine-unit, bdd-api, e2e-smoke]
    strategy:
      matrix:
        service: [backend, engine]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: testwright-ai-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
