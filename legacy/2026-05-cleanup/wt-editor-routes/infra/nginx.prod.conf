# ═══════════════════════════════════════════════════════════════════════════════
# Nexus QA — Nginx Production Config
# SSL termination + reverse proxy + security headers + rate limiting
# ═══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'upstream="$upstream_addr" uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    keepalive_requests 1000;
    server_tokens      off;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # ── Upload Limit ─────────────────────────────────────────────────────────
    client_max_body_size 50M;

    # ── Rate Limiting Zones ──────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m   rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m      rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_ai:10m        rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api_engine:10m    rate=20r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream engine {
        server engine:5001;
        keepalive 16;
    }

    upstream ai_gateway {
        server ai-gateway:8080;
        keepalive 16;
    }

    upstream frontend {
        server web:3000;
        keepalive 32;
    }

    upstream grafana {
        server grafana:3001;
        keepalive 8;
    }

    upstream alertmanager {
        server alertmanager:9093;
        keepalive 8;
    }

    # ── HTTP → HTTPS Yönlendirme ──────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Internal status endpoint for Prometheus exporter ─────────────────────
    server {
        listen 8080;
        server_name _;

        location /nginx_status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
    }

    # ── HTTPS — Ana Uygulama ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name bgtest.dev www.bgtest.dev;  # Kendi domain'inizi girin

        # ── SSL ──────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Modern TLS (TLS 1.2+ only)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # HSTS (1 yıl — subdomain dahil)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ── Security Headers ─────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"           always;
        add_header X-Content-Type-Options    "nosniff"              always;
        add_header X-XSS-Protection          "1; mode=block"        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; font-src 'self';"
            always;

        # ── Connection Limit ─────────────────────────────────────────────────
        limit_conn conn_limit 20;

        # ── Frontend (Next.js) ───────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         "upgrade";
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_read_timeout 120s;
            proxy_cache_bypass $http_upgrade;

            # Static asset caching
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
                proxy_pass http://frontend;
                expires    30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── Backend API ──────────────────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=api_auth burst=5 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /api/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # SSE (Server-Sent Events) için buffer kapatılır
            location ~* /stream$ {
                proxy_pass          http://backend;
                proxy_buffering     off;
                proxy_cache         off;
                proxy_read_timeout  3600s;
                chunked_transfer_encoding on;
                proxy_set_header    Connection  "";
                proxy_http_version  1.1;
            }
        }

        # ── Engine ───────────────────────────────────────────────────────────
        location /engine/ {
            limit_req zone=api_engine burst=10 nodelay;

            rewrite ^/engine/(.*)$ /$1 break;
            proxy_pass         http://engine;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;  # Test run uzun sürebilir
        }

        # ── AI Gateway ───────────────────────────────────────────────────────
        location /ai/ {
            limit_req zone=api_ai burst=10 nodelay;

            proxy_pass         http://ai_gateway/ai/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Grafana (monitoring dashboard) ───────────────────────────────────
        location /grafana/ {
            allow 127.0.0.1;
            allow ::1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass         http://grafana/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Alertmanager (alert UI) ──────────────────────────────────────────
        location /alertmanager/ {
            allow 127.0.0.1;
            allow ::1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass         http://alertmanager/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Health / Ready (load balancer probe) ─────────────────────────────
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # ── Swagger docs (prod'da isteğe bağlı kısıtlama) ────────────────────
        location /docs {
            allow 127.0.0.1;
            allow ::1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://backend/docs;
        }

        # ── robots.txt ───────────────────────────────────────────────────────
        location = /robots.txt {
            add_header Content-Type text/plain;
            return 200 "User-agent: *\nDisallow: /api/\nDisallow: /engine/\nDisallow: /grafana/\n";
        }
    }
}
