# ═══════════════════════════════════════════════════════════════════════════════
# Prometheus — BGTS / Nexus QA Metrik Toplama Konfigürasyonu
# ═══════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: production
    project: bgts-nexusqa

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────
  - job_name: bgts-backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: bgts-backend

  # ── Engine (Flask) ───────────────────────────────────────────────────────
  - job_name: bgts-engine
    metrics_path: /metrics
    static_configs:
      - targets: ['engine:5001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: bgts-engine

  # ── AI Gateway ───────────────────────────────────────────────────────────
  - job_name: bgts-ai-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['ai-gateway:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: bgts-ai-gateway

  # ── PostgreSQL (postgres_exporter) ───────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: bgts-postgres

  # ── Redis (redis_exporter) ───────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: bgts-redis

  # ── Nginx (nginx-prometheus-exporter) ────────────────────────────────────
  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: bgts-nginx

  # ── Prometheus kendisi ────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
