# TestwrightAI — Ana Docker Compose
# Tüm servisleri tek dosyadan yönetir.
#
# Kullanım:
#   docker compose up -d              # Tüm servisler
#   docker compose up postgres redis  # Sadece altyapı
#   docker compose up engine          # Sadece otomasyon motoru

services:
  # ─── Altyapı ─────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16  # pgvector extension için (postgres:16-alpine'dan upgrade)
    container_name: twai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: twai_user
      POSTGRES_PASSWORD: twai_pass
      POSTGRES_DB: twai_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twai_user -d twai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: twai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── FastAPI Backend (Sentetik Veri + TSPM) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: twai_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://twai_user:twai_pass@postgres:5432/syndata_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      ENGINE_BASE_URL: "http://engine:5001"
      ENGINE_INTERNAL_KEY: "twai-internal-key-change-me"
      # Nexus QA AI Gateway
      AI_GATEWAY_BASE_URL: "http://ai-gateway:8080"
      GATEWAY_INTERNAL_KEY: "${GATEWAY_INTERNAL_KEY}"
      RUNNING_IN_DOCKER: "1"
      RATE_LIMIT_REQUIRED: ${RATE_LIMIT_REQUIRED:-false}
      REDIS_REQUIRED: ${REDIS_REQUIRED:-false}
      AUTH_STATE_REDIS_REQUIRED: ${AUTH_STATE_REDIS_REQUIRED:-false}
      LLM_RATE_LIMIT_REDIS_REQUIRED: ${LLM_RATE_LIMIT_REDIS_REQUIRED:-false}
      CICD_REQUIRE_WEBHOOK_SECRETS: ${CICD_REQUIRE_WEBHOOK_SECRETS:-false}
      N8N_REQUIRE_CALLBACK_SECRET: ${N8N_REQUIRE_CALLBACK_SECRET:-false}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITLAB_WEBHOOK_TOKEN: ${GITLAB_WEBHOOK_TOKEN:-}
      JENKINS_WEBHOOK_TOKEN: ${JENKINS_WEBHOOK_TOKEN:-}
      N8N_CALLBACK_TOKEN: ${N8N_CALLBACK_TOKEN:-}
      # Ollama / Local LLM
      AI_PROVIDER: "ollama"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434/v1"
      OLLAMA_API_KEY: "ollama"
      OLLAMA_MODEL_ANALYST: "qwen2.5:14b"
      OLLAMA_MODEL_FAST: "llama3.1:8b"
      OLLAMA_MODEL_CODER: "qwen2.5-coder:7b"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      engine:
        condition: service_started
      ai-gateway:
        condition: service_healthy

  # ─── FastAPI Backend — RQ Worker (Asenkron İşler) ────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: twai_worker
    restart: unless-stopped
    command: ["sh", "-c", "rq worker -u $$REDIS_URL $$RQ_QUEUE_NAME"]
    environment:
      DATABASE_URL: postgresql+psycopg2://twai_user:twai_pass@postgres:5432/syndata_db
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: syndata_jobs
      ENGINE_BASE_URL: "http://engine:5001"
      ENGINE_INTERNAL_KEY: "twai-internal-key-change-me"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Flask Automation Engine (Test Otomasyon Motoru) ─────────────────────────
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: twai_engine
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      APP_ENV: ${APP_ENV:-development}
      ENGINE_PORT: "5001"
      BASE_URL: "https://example.com"
      HEADLESS: "true"
      BROWSER: chromium
      ENGINE_INTERNAL_KEY: "twai-internal-key-change-me"
      # Visium Farm — Mobil emülasyon
      MOBILE_ARTIFACTS_DIR: "/app/mobile_uploads"
      # Appium gerçek cihaz entegrasyonu (gelecek — şimdilik devre dışı)
      # APPIUM_URL: "http://appium:4723"
    volumes:
      - engine_data:/app/reports
      - engine_screenshots:/app/screenshots
      - engine_mobile_uploads:/app/mobile_uploads

  # ─── Next.js Frontend ───────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: twai_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # SSR + next.config.mjs rewrites → backend container (Docker iç ağ)
      NEXT_PUBLIC_API_BASE: http://backend:8000
      # SSR engine çağrıları → container iç ağ; tarayıcı bundle'ı Dockerfile'daki değeri kullanır
      NEXT_PUBLIC_ENGINE_BASE: http://engine:5001
    depends_on:
      - backend
      - engine

  # ─── Nexus QA AI Gateway (FAZ 0) ────────────────────────────────────────────
  # Tüm AI isteklerinin geçtiği merkezi mikroservis.
  # Groq → Gemini → Ollama → g4f fallback zinciri.
  ai-gateway:
    build:
      context: ./ai-gateway
      dockerfile: Dockerfile
    container_name: nexusqa_ai_gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: "8080"
      DEBUG: "false"
      INTERNAL_KEY: "${GATEWAY_INTERNAL_KEY}"
      REDIS_URL: "redis://redis:6379/1"
      # AI sağlayıcı seçimi: "ollama" → Ollama primary; "auto" → Groq→Gemini→Ollama→g4f
      AI_PROVIDER: "${AI_PROVIDER:-ollama}"
      # Groq API key (ücretsiz: https://console.groq.com)
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      GROQ_MODEL: "llama3-70b-8192"
      GROQ_ENABLED: "${GROQ_ENABLED:-true}"
      # Gemini API key (ücretsiz: https://aistudio.google.com/app/apikey)
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "gemini-1.5-flash"
      GEMINI_ENABLED: "${GEMINI_ENABLED:-true}"
      # Ollama — OpenAI-uyumlu endpoint (host.docker.internal = Mac host)
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-ollama}"
      OLLAMA_ENABLED: "${OLLAMA_ENABLED:-true}"
      # Göreve özel Ollama modelleri
      OLLAMA_MODEL_ANALYST: "${OLLAMA_MODEL_ANALYST:-qwen2.5:14b}"
      OLLAMA_MODEL_FAST: "${OLLAMA_MODEL_FAST:-llama3.1:8b}"
      OLLAMA_MODEL_CODER: "${OLLAMA_MODEL_CODER:-qwen2.5-coder:7b}"
      G4F_ENABLED: "true"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Ollama local erişimi için

  # ─── NOT: ai-test-pipeline ───────────────────────────────────────────────────
  # ai-test-pipeline/ dizini şu an yalnızca __pycache__ içermektedir.
  # Kaynak kodlar eklendiğinde bu blok aktif edilecek (port: 5003).
  # ai-test-pipeline:
  #   build:
  #     context: ./ai-test-pipeline
  #     dockerfile: Dockerfile
  #   container_name: twai_ai_pipeline
  #   ports:
  #     - "5003:5003"
  #   depends_on:
  #     - backend
  #     - redis

  # ─── Appium (Gelecek: Gerçek Cihaz) ─────────────────────────────────────────
  # Gerçek fiziksel cihaz veya emülatör testleri için Appium server.
  # Aktifleştirmek için yorum satırlarını kaldırın ve engine servisinde
  # APPIUM_URL: "http://appium:4723" env değişkenini açın.
  # appium:
  #   image: appium/appium:latest
  #   container_name: twai_appium
  #   restart: unless-stopped
  #   ports:
  #     - "4723:4723"
  #   volumes:
  #     - /dev/bus/usb:/dev/bus/usb  # USB cihaz erişimi
  #   privileged: true

volumes:
  pgdata:
    driver: local
  engine_data:
    driver: local
  engine_screenshots:
    driver: local
  engine_mobile_uploads:
    driver: local
