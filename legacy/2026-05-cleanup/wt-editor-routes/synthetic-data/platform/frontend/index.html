<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntheticBankData - Sentetik Banka Veri Platformu</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        darkBg: '#0f172a',
                        cardBg: '#1e293b',
                        lightBorder: 'rgba(255, 255, 255, 0.1)',
                        borderLight: 'rgba(255, 255, 255, 0.05)',
                    },
                    backgroundColor: {
                        'glass': 'rgba(30, 41, 59, 0.4)',
                        'glass-dark': 'rgba(15, 23, 42, 0.6)',
                    },
                    backdropBlur: {
                        xs: '2px',
                    },
                    animation: {
                        'pulse': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fadeIn': 'fadeIn 0.3s ease-in-out',
                        'slideIn': 'slideIn 0.3s ease-out',
                        'slideInUp': 'slideInUp 0.3s ease-out',
                        'bounce': 'bounce 1s infinite',
                    },
                    keyframes: {
                        slideInUp: {
                            '0%': { transform: 'translateY(100%)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                    },
                }
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
        }

        html, body, #app {
            height: 100%;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .glass-morphism {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }

        .toast-enter {
            animation: slideInUp 0.3s ease-out;
        }

        .toast-exit {
            animation: slideInUp 0.3s ease-out reverse;
        }

        .progress-step {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .progress-step.active .step-circle {
            animation: pulse 2s infinite;
        }

        .step-circle {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .table-row-hover:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

        .sort-indicator {
            display: inline-block;
            margin-left: 0.25rem;
            font-size: 0.75rem;
        }

        .modal-overlay {
            animation: fadeIn 0.2s ease-out;
        }

        .modal-content {
            animation: slideInUp 0.3s ease-out;
        }

        .chart-bar {
            transition: all 0.3s ease;
        }

        .chart-bar:hover {
            opacity: 0.8;
        }

        .status-indicator {
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
            animation: pulse 2s infinite;
        }

        .status-indicator.active {
            background-color: #10b981;
        }

        .status-indicator.inactive {
            background-color: #ef4444;
        }

        .status-indicator.pending {
            background-color: #f59e0b;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useContext, createContext } = React;

        // Toast Context
        const ToastContext = createContext();

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);

            const addToast = (message, variant = 'info', duration = 3000) => {
                const id = Date.now();
                const newToast = { id, message, variant };
                setToasts(prev => [...prev, newToast]);

                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, duration);
            };

            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <ToastContainer toasts={toasts} />
                </ToastContext.Provider>
            );
        };

        const ToastContainer = ({ toasts }) => {
            return (
                <div className="fixed bottom-4 right-4 space-y-2 z-50 max-w-xs">
                    {toasts.map(toast => (
                        <Toast key={toast.id} {...toast} />
                    ))}
                </div>
            );
        };

        const Toast = ({ message, variant }) => {
            const bgColor = {
                success: 'bg-success',
                warning: 'bg-warning',
                danger: 'bg-danger',
                info: 'bg-primary'
            }[variant];

            const borderColor = {
                success: 'border-success',
                warning: 'border-warning',
                danger: 'border-danger',
                info: 'border-primary'
            }[variant];

            return (
                <div className={`toast-enter ${bgColor} border ${borderColor} rounded-lg px-4 py-3 text-white shadow-lg flex items-center gap-3`}>
                    <span className="flex-1">{message}</span>
                    <div className={`w-1 h-1 rounded-full ${bgColor}`}></div>
                </div>
            );
        };

        const useToast = () => {
            const context = useContext(ToastContext);
            if (!context) {
                throw new Error('useToast must be used within ToastProvider');
            }
            return context;
        };

        // Modal Component
        const Modal = ({ isOpen, onClose, title, children, footer, size = 'md' }) => {
            if (!isOpen) return null;

            const sizeClasses = {
                sm: 'max-w-sm',
                md: 'max-w-md',
                lg: 'max-w-lg',
                xl: 'max-w-xl',
                '2xl': 'max-w-2xl'
            }[size];

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center">
                    <div
                        className="modal-overlay fixed inset-0 bg-black/40 backdrop-blur-sm"
                        onClick={onClose}
                    ></div>
                    <div className={`modal-content relative ${sizeClasses} w-full mx-4 bg-cardBg rounded-lg shadow-2xl`}>
                        <div className="flex items-center justify-between p-6 border-b border-lightBorder">
                            <h2 className="text-xl font-bold text-white">{title}</h2>
                            <button
                                onClick={onClose}
                                className="text-gray-400 hover:text-white transition-colors"
                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                        <div className="p-6">
                            {children}
                        </div>
                        {footer && (
                            <div className="flex gap-3 p-6 border-t border-lightBorder">
                                {footer}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // DataTable Component
        const DataTable = ({ columns, data, sortable = true }) => {
            const [sortField, setSortField] = useState(null);
            const [sortDir, setSortDir] = useState('asc');

            const handleSort = (field) => {
                if (!sortable) return;
                if (sortField === field) {
                    setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
                } else {
                    setSortField(field);
                    setSortDir('asc');
                }
            };

            const sortedData = [...data].sort((a, b) => {
                if (!sortField) return 0;
                const aVal = a[sortField];
                const bVal = b[sortField];
                const cmp = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                return sortDir === 'asc' ? cmp : -cmp;
            });

            return (
                <div className="overflow-x-auto rounded-lg border border-lightBorder">
                    <table className="w-full text-sm">
                        <thead className="bg-glass-dark border-b border-lightBorder">
                            <tr>
                                {columns.map((col) => (
                                    <th
                                        key={col.key}
                                        className="px-4 py-3 text-left font-semibold text-gray-200 cursor-pointer hover:text-white transition-colors"
                                        onClick={() => handleSort(col.key)}
                                    >
                                        <div className="flex items-center gap-2">
                                            {col.label}
                                            {sortable && (
                                                <span className="sort-indicator text-gray-400">
                                                    {sortField === col.key && (sortDir === 'asc' ? '▲' : '▼')}
                                                </span>
                                            )}
                                        </div>
                                    </th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {sortedData.map((row, idx) => (
                                <tr key={idx} className="table-row-hover border-b border-borderLight last:border-b-0">
                                    {columns.map((col) => (
                                        <td key={col.key} className={`px-4 py-3 ${idx % 2 === 0 ? 'bg-glass-dark/30' : ''}`}>
                                            {col.render ? col.render(row[col.key], row) : row[col.key]}
                                        </td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        // Dashboard Page
        const Dashboard = () => {
            const { addToast } = useToast();
            const [showShortcuts, setShowShortcuts] = useState(false);

            const recentActivities = [
                { id: 1, action: 'Veri Üretimi Tamamlandı', time: '2 dakika önce', status: 'success' },
                { id: 2, action: 'Dosya Yüklendi: customers.csv', time: '15 dakika önce', status: 'success' },
                { id: 3, action: 'API İsteği Başarılı', time: '1 saat önce', status: 'success' },
                { id: 4, action: 'Analiz Başlatıldı', time: '2 saat önce', status: 'info' },
                { id: 5, action: 'Veritabanı Bağlantısı Kuruldu', time: '3 saat önce', status: 'success' },
                { id: 6, action: 'İçe Aktarma Tamamlandı', time: '4 saat önce', status: 'success' },
                { id: 7, action: 'Uyarı: Yüksek Bellek Kullanımı', time: '5 saat önce', status: 'warning' },
                { id: 8, action: 'Sistem Başlatıldı', time: '6 saat önce', status: 'info' },
            ];

            const last7Days = [
                { day: 'Pzt', count: 245 },
                { day: 'Sal', count: 389 },
                { day: 'Çar', count: 512 },
                { day: 'Per', count: 478 },
                { day: 'Cum', count: 623 },
                { day: 'Cmt', count: 751 },
                { day: 'Paz', count: 634 }
            ];

            const maxCount = Math.max(...last7Days.map(d => d.count));

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-3xl font-bold">Pano</h1>
                        <button
                            onClick={() => setShowShortcuts(true)}
                            className="p-2 rounded-lg bg-glass hover:bg-glass-dark transition-colors text-gray-400 hover:text-white"
                            title="Kısayolları Göster"
                        >
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="glass-morphism rounded-lg p-6">
                            <div className="text-gray-400 text-sm mb-2">Toplam Üretilen Kayıt</div>
                            <div className="text-4xl font-bold text-primary">1,247,842</div>
                            <div className="text-xs text-success mt-2">↑ %12.5 bu ay</div>
                        </div>
                        <div className="glass-morphism rounded-lg p-6">
                            <div className="text-gray-400 text-sm mb-2">Başarılı İşlemler</div>
                            <div className="text-4xl font-bold text-secondary">98.7%</div>
                            <div className="text-xs text-success mt-2">↑ %2.3 bu ay</div>
                        </div>
                        <div className="glass-morphism rounded-lg p-6">
                            <div className="text-gray-400 text-sm mb-2">Ortalama Tepki Süresi</div>
                            <div className="text-4xl font-bold text-primary">234ms</div>
                            <div className="text-xs text-success mt-2">↓ %5.1 bu ay</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="glass-morphism rounded-lg p-6">
                            <h2 className="text-xl font-bold mb-6">Son 7 Günlük Üretim</h2>
                            <div className="space-y-4">
                                {last7Days.map((item, idx) => (
                                    <div key={idx} className="flex items-end gap-4">
                                        <div className="w-12 text-right text-sm text-gray-400">{item.day}</div>
                                        <div className="flex-1 flex items-end gap-2">
                                            <div
                                                className="chart-bar bg-gradient-primary rounded-t"
                                                style={{
                                                    height: `${(item.count / maxCount) * 150}px`,
                                                    minHeight: '4px'
                                                }}
                                            ></div>
                                        </div>
                                        <div className="w-16 text-right text-xs text-gray-400">{item.count}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="glass-morphism rounded-lg p-6">
                            <h2 className="text-xl font-bold mb-6">Sistem Durumu</h2>
                            <div className="space-y-4">
                                <div className="flex items-center justify-between">
                                    <span className="text-gray-300">API Durumu</span>
                                    <div className="flex items-center gap-2">
                                        <div className="status-indicator active"></div>
                                        <span className="text-sm text-success">Aktif</span>
                                    </div>
                                </div>
                                <div className="flex items-center justify-between">
                                    <span className="text-gray-300">Veritabanı Bağlantısı</span>
                                    <div className="flex items-center gap-2">
                                        <div className="status-indicator active"></div>
                                        <span className="text-sm text-success">Bağlı</span>
                                    </div>
                                </div>
                                <div className="flex items-center justify-between">
                                    <span className="text-gray-300">İşlem Kuyruğu</span>
                                    <div className="flex items-center gap-2">
                                        <div className="status-indicator active"></div>
                                        <span className="text-sm text-success">Boş</span>
                                    </div>
                                </div>
                                <div className="flex items-center justify-between">
                                    <span className="text-gray-300">Depolama Durumu</span>
                                    <div className="flex items-center gap-2">
                                        <div className="status-indicator pending"></div>
                                        <span className="text-sm text-warning">%78 Dolu</span>
                                    </div>
                                </div>
                                <div className="flex items-center justify-between">
                                    <span className="text-gray-300">Bellek Kullanımı</span>
                                    <div className="flex items-center gap-2">
                                        <div className="status-indicator active"></div>
                                        <span className="text-sm text-success">%42</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="glass-morphism rounded-lg p-6">
                        <h2 className="text-xl font-bold mb-6">Son Aktiviteler</h2>
                        <div className="space-y-3">
                            {recentActivities.map((activity) => (
                                <div key={activity.id} className="flex items-center justify-between p-3 rounded bg-glass-dark/50 hover:bg-glass-dark transition-colors">
                                    <div className="flex items-center gap-3">
                                        {activity.status === 'success' && (
                                            <div className="w-2 h-2 rounded-full bg-success"></div>
                                        )}
                                        {activity.status === 'warning' && (
                                            <div className="w-2 h-2 rounded-full bg-warning"></div>
                                        )}
                                        {activity.status === 'info' && (
                                            <div className="w-2 h-2 rounded-full bg-primary"></div>
                                        )}
                                        <span className="text-gray-300">{activity.action}</span>
                                    </div>
                                    <span className="text-xs text-gray-500">{activity.time}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <Modal
                        isOpen={showShortcuts}
                        onClose={() => setShowShortcuts(false)}
                        title="Klavye Kısayolları"
                        size="sm"
                    >
                        <div className="space-y-3">
                            <div className="flex justify-between items-center pb-2 border-b border-lightBorder">
                                <span className="text-gray-400">Üret</span>
                                <kbd className="px-2 py-1 bg-glass-dark rounded text-xs">Ctrl+U</kbd>
                            </div>
                            <div className="flex justify-between items-center pb-2 border-b border-lightBorder">
                                <span className="text-gray-400">Dışa Aktar</span>
                                <kbd className="px-2 py-1 bg-glass-dark rounded text-xs">Ctrl+E</kbd>
                            </div>
                            <div className="flex justify-between items-center pb-2 border-b border-lightBorder">
                                <span className="text-gray-400">Ayarlar</span>
                                <kbd className="px-2 py-1 bg-glass-dark rounded text-xs">Ctrl+,</kbd>
                            </div>
                            <div className="flex justify-between items-center pb-2 border-b border-lightBorder">
                                <span className="text-gray-400">Yükleme</span>
                                <kbd className="px-2 py-1 bg-glass-dark rounded text-xs">Ctrl+O</kbd>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-gray-400">Arama</span>
                                <kbd className="px-2 py-1 bg-glass-dark rounded text-xs">Ctrl+F</kbd>
                            </div>
                        </div>
                    </Modal>
                </div>
            );
        };

        // CSV satırını parse et (tırnaklı alan desteğiyle)
        const parseCsvLine = (line) => {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') { inQuotes = !inQuotes; }
                else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                else { current += ch; }
            }
            result.push(current.trim());
            return result;
        };

        // Generation Page
        const Generation = () => {
            const { addToast } = useToast();
            const [showConfirmation, setShowConfirmation] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [currentStep, setCurrentStep] = useState(null);
            const [generatedData, setGeneratedData] = useState(null); // { headers, rows, totalRows, downloadUrl, fileName, rawCsv }
            const [naturalText, setNaturalText] = useState('');
            const [useNatural, setUseNatural] = useState(false);
            const [stepLabel, setStepLabel] = useState('');

            const steps = [
                { id: 1, label: 'İstek Gönderiliyor' },
                { id: 2, label: 'Veri Üretiliyor' },
                { id: 3, label: 'Dosya Oluşturuluyor' },
                { id: 4, label: 'Önizleme Yükleniyor' },
                { id: 5, label: 'Tamamlandı' }
            ];

            const SCENARIO_MAP = {
                'customer_banking': 'bireysel',
                'corporate_finance': 'ticari',
                'transactions': 'cok_islem',
                'risk_management': 'riskli'
            };

            const DATA_TYPE_LABELS = {
                'customer_banking': 'Müşteri Bankacılığı',
                'corporate_finance': 'Kurumsal Finans',
                'transactions': 'İşlemler',
                'risk_management': 'Risk Yönetimi'
            };

            const [scenarioConfig, setScenarioConfig] = useState({
                recordCount: 100,
                dataType: 'customer_banking'
            });

            const handleGenerateClick = () => {
                if (useNatural && naturalText.trim().length < 10) {
                    addToast('Lütfen en az 10 karakter uzunluğunda bir metin girin.', 'warning');
                    return;
                }
                setShowConfirmation(true);
            };

            const handleConfirmGenerate = async () => {
                setShowConfirmation(false);
                setIsGenerating(true);
                setGeneratedData(null);

                try {
                    setCurrentStep(1);
                    setStepLabel('API isteği gönderiliyor...');

                    let jobId;

                    if (useNatural && naturalText.trim()) {
                        const res = await fetch('/api/v1/generate-natural', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: naturalText.trim(), output_format: 'csv' })
                        });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.message || data.detail || 'Üretim hatası');
                        jobId = data.job_id;
                    } else {
                        const scenarioType = SCENARIO_MAP[scenarioConfig.dataType] || 'bireysel';
                        setCurrentStep(2);
                        setStepLabel(`${scenarioConfig.recordCount} kayıt üretiliyor...`);
                        const res = await fetch('/api/v1/generate-scenario', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                scenario_type: scenarioType,
                                count: scenarioConfig.recordCount,
                                output_format: 'csv'
                            })
                        });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.message || data.detail || 'Üretim hatası');
                        jobId = data.id;
                    }

                    setCurrentStep(3);
                    setStepLabel('Dosya bilgisi alınıyor...');

                    const exportRes = await fetch(`/api/v1/export/${jobId}`);
                    const exportData = await exportRes.json();
                    if (!exportRes.ok) throw new Error(exportData.message || 'Dışa aktarım hatası');

                    setCurrentStep(4);
                    setStepLabel('Veri önizlemesi yükleniyor...');

                    const csvRes = await fetch(exportData.download_url);
                    if (!csvRes.ok) throw new Error('CSV dosyası indirilemedi');
                    const rawCsv = await csvRes.text();

                    // JSON indirme için URL oluştur
                    const jsonDownloadUrl = exportData.download_url.replace(/\.csv$/, '.json') || exportData.download_url;

                    // CSV parse
                    const lines = rawCsv.trim().split('\n').filter(l => l.trim());
                    const headers = parseCsvLine(lines[0]);
                    const rows = lines.slice(1, 51).map(line => {
                        const vals = parseCsvLine(line);
                        return headers.reduce((obj, h, i) => ({ ...obj, [h]: vals[i] !== undefined ? vals[i] : '' }), {});
                    });

                    setCurrentStep(5);
                    setStepLabel('Tamamlandı!');
                    setGeneratedData({
                        headers,
                        rows,
                        totalRows: exportData.row_count,
                        downloadUrl: exportData.download_url,
                        fileName: exportData.file_name,
                        rawCsv
                    });

            const [regResults, setRegResults] = React.useState([]);
            const [regHistory] = React.useState([

                { date: '2026-03-25', set: 'Critical Path', total: 5, passed: 5, failed: 0, duration: '1m 20s', rate: 100 },

                    if (a.type === 'fill') return `    await page.fill('${a.target}', '${a.value}');`;
                    if (a.type === 'assert') return `    await expect(page.locator('${a.target}')).toBeVisible();`;
                    return `    // ${a.type}: ${a.target}`;
                } else if (t === 'selenium') {
                    if (a.type === 'navigate') return `driver.get('${a.target}')`;
                    if (a.type === 'click') return `driver.find_element(By.CSS_SELECTOR, '${a.target}').click()`;
                    if (a.type === 'fill') return `driver.find_element(By.CSS_SELECTOR, '${a.target}').send_keys('${a.value}')`;
                    return `# ${a.type}: ${a.target}`;
                } else if (t === 'cucumber') {
                    if (a.type === 'navigate') return `    Verilen kullanıcı "${a.target}" adresine gider`;
                    if (a.type === 'click') return `    Eğer "${a.target}" elementine tıklarsa`;
                    if (a.type === 'fill') return `    Ve "${a.target}" alanına "${a.value}" değerini girer`;
                    if (a.type === 'assert') return `    O zaman "${a.target}" görünür olmalıdır`;
                    return `    # ${a.type}`;
                } else if (t === 'pom') {
                    if (a.type === 'navigate') return `        self.page.goto('${a.target}')`;
                    if (a.type === 'click') return `        self.page.locator('${a.target}').click()`;
                    if (a.type === 'fill') return `        self.page.locator('${a.target}').fill('${a.value}')`;

                        </div>
                    ))}

            );

        // Tooltip Component
        const Tooltip = ({ text, children, position = 'top' }) => {
            const [showTooltip, setShowTooltip] = useState(false);

            const positionClasses = {
                top: 'bottom-full mb-2',
                bottom: 'top-full mt-2',
                left: 'right-full mr-2',
                right: 'left-full ml-2'
            };

            return (
                <div className="relative inline-block">
                    <div
                        onMouseEnter={() => setShowTooltip(true)}
                        onMouseLeave={() => setShowTooltip(false)}
                    >
                        {children}
                    </div>
                    {showTooltip && (
                        <div className={`absolute ${positionClasses[position]} bg-glass-dark rounded px-3 py-2 text-xs text-gray-300 whitespace-nowrap z-10`}>
                            {text}
                        </div>
                    )}
                </div>
            );
        };

        // Pagination Component
        const Pagination = ({ currentPage, totalPages, onPageChange }) => {
            const pages = [];
            const maxVisible = 5;

            if (totalPages <= maxVisible) {
                for (let i = 1; i <= totalPages; i++) pages.push(i);
            } else {
                if (currentPage <= 3) {
                    for (let i = 1; i <= maxVisible; i++) pages.push(i);
                    pages.push('...');
                    pages.push(totalPages);
                } else if (currentPage >= totalPages - 2) {
                    pages.push(1);
                    pages.push('...');
                    for (let i = totalPages - 4; i <= totalPages; i++) pages.push(i);
                } else {
                    pages.push(1);
                    pages.push('...');
                    for (let i = currentPage - 1; i <= currentPage + 1; i++) pages.push(i);
                    pages.push('...');
                    pages.push(totalPages);
                }
            }

            return (
                <div className="flex items-center gap-2 justify-center mt-6">
                    <button
                        onClick={() => onPageChange(currentPage - 1)}
                        disabled={currentPage === 1}
                        className="px-3 py-2 rounded bg-glass hover:bg-glass-dark disabled:opacity-50 transition-colors"

                                key={idx}
                                onClick={() => onPageChange(page)}

                                }`}
                            >
                                {page}
                            </button>
                        )

                    >
                        Sonraki
                    </button>
                </div>
            );
        };

            return (

                            <div className="flex flex-col items-center">
                                <div className={`w-3 h-3 rounded-full ${event.status === 'completed' ? 'bg-success' : 'bg-primary'}`}></div>
                                {idx < events.length - 1 && <div className="w-0.5 h-12 bg-lightBorder"></div>}
                            </div>
                            <div className="pb-4">
                                <h4 className="font-semibold text-white">{event.title}</h4>
                                <p className="text-sm text-gray-400 mt-1">{event.description}</p>
                                <span className="text-xs text-gray-500 mt-2">{event.time}</span>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // Quick Action Button Component
        const QuickAction = ({ icon, label, onClick, variant = 'primary' }) => {
            return (
                <button

                    className={`flex flex-col items-center gap-2 p-4 rounded-lg transition-all hover:scale-105 ${

                >
                    <span className="text-2xl">{icon}</span>
                    <span className="text-xs font-medium text-center">{label}</span>
                </button>
            );
        };

        ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    </script>

    <!-- ── Test Automation API Patch ────────────────────────────────────────
         Bu script, TestAutomation bileşenindeki mock fonksiyonları gerçek
         fetch() çağrılarıyla override eder. React render'dan SONRA çalışır.
    ─────────────────────────────────────────────────────────────────────── -->
    <script type="text/babel">
    (function patchTestAutomation() {

      const API = '/api/v1/test-platform';

      /* ── Toast yardımcısı (global addToast erişimi yoksa fallback) ── */
      function showToast(msg, type = 'info') {
        console.log(`[${type.toUpperCase()}] ${msg}`);
      }

      /* ── Loading spinner helper ── */
      function setLoading(btnEl, loading, originalText) {
        if (!btnEl) return;
        btnEl.disabled = loading;
        btnEl.textContent = loading ? '⏳ Yükleniyor...' : originalText;
      }

      /* ── Generic fetch wrapper ── */
      async function apiFetch(url, options = {}) {
        const res = await fetch(url, {
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        return res.json();
      }

      /* ════════════════════════════════════════════════════════════════
         React component patch — bileşen mount olduktan sonra window
         üzerinden erişilebilir helper'lar tanımla; asıl override React
         context yerine DOM event delegation ile yapılır.
      ═══════════════════════════════════════════════════════════════ */

      /* Projeleri API'den yükle ve select'e doldur */
      window.__ta_loadProjects = async function() {
        try {
          const projects = await apiFetch(`${API}/projects`);
          return projects;
        } catch (e) {
          console.warn('Proje listesi yüklenemedi:', e.message);
          return [];
        }
      };

      /* Yeni proje kaydet */
      window.__ta_saveProject = async function(proj) {
        return apiFetch(`${API}/projects`, {
          method: 'POST',
          body: JSON.stringify({
            name: proj.name,
            platform: proj.platform,
            url: proj.url || '',
            description: proj.desc || '',
          }),
        });
      };

      /* Örnek doküman yükle */
      window.__ta_loadExampleDoc = async function() {
        const data = await apiFetch(`${API}/analyze-example`);
        return data.content;
      };

      /* Doküman analiz et */
      window.__ta_analyzeDoc = async function(docText, docName) {
        return apiFetch(`${API}/analyze-document`, {
          method: 'POST',
          body: JSON.stringify({ content: docText, document_name: docName || 'document.txt' }),
        });
      };

      /* Manuel test üret */
      window.__ta_generateTests = async function(requirements) {
        return apiFetch(`${API}/generate-tests`, {
          method: 'POST',
          body: JSON.stringify({ requirements }),
        });
      };

      /* Otomasyon kodu üret */
      window.__ta_generateAutomation = async function(testCase, framework) {
        return apiFetch(`${API}/generate-automation`, {
          method: 'POST',
          body: JSON.stringify({ test_case: testCase, framework: framework || 'playwright' }),
        });
      };

      /* Manuel test kaydet */
      window.__ta_saveManualTest = async function(test, project) {
        return apiFetch(`${API}/manual-test`, {
          method: 'POST',
          body: JSON.stringify({
            title: test.name || test.title,
            steps: test.steps || '',
            module: project || '',
            precondition: test.precond || test.precondition || '',
            expected: test.expected || '',
            priority: test.priority || 'P2',
            project: project || '',
          }),
        });
      };

      /* Testleri çalıştır */
      window.__ta_executeTests = async function(testCases, suiteName) {
        return apiFetch(`${API}/execute`, {
          method: 'POST',
          body: JSON.stringify({
            test_cases: testCases.map(tc => ({
              id: tc.id,
              title: tc.name || tc.title,
            })),
            suite_name: suiteName || 'Test Suite',
          }),
        });
      };

      /* Regresyon çalıştır */
      window.__ta_executeRegression = async function(testCases, suiteName) {
        return apiFetch(`${API}/execute-regression`, {
          method: 'POST',
          body: JSON.stringify({
            test_cases: (testCases || []).map(tc => ({
              id: tc.id,
              title: tc.name || tc.title,
            })),
            suite_name: suiteName || 'Regression Suite',
          }),
        });
      };

      /* Çalıştırma geçmişi */
      window.__ta_getExecutionHistory = async function() {
        return apiFetch(`${API}/execution-history`);
      };

      /* Dashboard raporu */
      window.__ta_getDashboard = async function() {
        return apiFetch(`${API}/report/dashboard`);
      };

    })();
    </script>

    <!-- ── TestAutomation React Patch (Babel) ───────────────────────────── -->
    <script type="text/babel">
    /* Bu bileşen TestAutomation'ı tamamen yeniden tanımlar ve
       window.__ta_* yardımcılarını kullanarak API çağrıları yapar.      */

    const _OriginalTestAutomation = window.__OriginalTestAutomation;

    /* Global patch hook: React render pipeline'ına müdahale etmek yerine
       TestAutomation bileşenini doğrudan yeniden yazıyoruz.              */

    /* ── API-aware TestAutomation ── */
    window.__TestAutomationAPIEnabled = true;

    /* ── Patch: project loading ── */
    /* React bileşeni zaten render edildiği için, bileşenin kullandığı
       fonksiyonları doğrudan DOM olaylarıyla tetikliyoruz.               */

    /* ── Global event delegation for Test Automation buttons ── */
    document.addEventListener('click', async function(e) {
      const btn = e.target.closest('[data-ta-action]');
      if (!btn) return;

      const action = btn.getAttribute('data-ta-action');
      const originalText = btn.textContent.trim();

      try {
        if (action === 'load-example') {
          btn.disabled = true;
          btn.textContent = '⏳ Yükleniyor...';
          const text = await window.__ta_loadExampleDoc();
          /* Textarea'yı bul ve değeri set et */
          const ta = document.querySelector('[data-ta-doc-textarea]');
          if (ta) {
            const nativeInputValueSetter = Object.getOwnPropertyDescriptor(
              window.HTMLTextAreaElement.prototype, 'value'
            ).set;
            nativeInputValueSetter.call(ta, text);
            ta.dispatchEvent(new Event('input', { bubbles: true }));
          }
          btn.disabled = false;
          btn.textContent = originalText;
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = originalText;
        console.error(`[TA] ${action} hatası:`, err.message);
        alert(`Hata: ${err.message}`);
      }
    });

    </script>

    <!-- ── TestAutomation Full API Rewrite ─────────────────────────────────
         TestAutomation bileşenini baştan yeniden yazarak API entegrasyonunu
         React state içinde doğru şekilde yapıyoruz.
    ─────────────────────────────────────────────────────────────────────── -->
    <script type="text/babel">
    /* Override: React bileşeni mount olduktan sonra window üzerinde
       expose edilen referanslar aracılığıyla API çağrıları enjekte edilir.

       Strateji: TestAutomation component'i render edildikten sonra
       React DevTools hook'u kullanmak yerine, bileşenin render ettiği
       butonlara data-ta-action attribute'larını ekleyen bir MutationObserver
       çalıştırıyoruz. Böylece mevcut React state'ini bozmuyoruz ve
       sadece side-effect olarak API çağrıları ekliyoruz.
    */

    (function initTAAPIIntegration() {

      const API = '/api/v1/test-platform';

      async function apiFetch(url, opts = {}) {
        const r = await fetch(url, { headers: {'Content-Type':'application/json'}, ...opts });
        if (!r.ok) {
          const e = await r.json().catch(() => ({}));
          throw new Error(e.detail || `HTTP ${r.status}`);
        }
        return r.json();
      }

      /* React internal fiber erişimi */
      function getReactFiber(el) {
        const key = Object.keys(el).find(k => k.startsWith('__reactFiber') || k.startsWith('__reactInternalInstance'));
        return key ? el[key] : null;
      }

      function getStateNode(el) {
        let fiber = getReactFiber(el);
        while (fiber) {
          if (fiber.memoizedState && fiber.stateNode) return fiber.stateNode;
          fiber = fiber.return;
        }
        return null;
      }

      /* React useState hook'larına erişim için fiber traversal */
      function getHookStates(el) {
        let fiber = getReactFiber(el);
        while (fiber) {
          if (fiber.memoizedState && typeof fiber.type === 'function') {
            const states = [];
            let hook = fiber.memoizedState;
            while (hook) {
              states.push(hook.memoizedState);
              hook = hook.next;
            }
            return { fiber, states };
          }
          fiber = fiber.return;
        }
        return null;
      }

      /* ── Toast göster ── */
      function toast(msg, type='info') {
        const colors = { success:'#10b981', error:'#ef4444', warning:'#f59e0b', info:'#3b82f6' };
        const el = document.createElement('div');
        el.style.cssText = `position:fixed;bottom:20px;right:20px;z-index:99999;padding:12px 20px;background:${colors[type]||colors.info};color:#fff;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.3);animation:slideInUp .3s ease`;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3500);
      }

      /* ── Spinner ── */
      function spin(btn, on, orig) {
        if (!btn) return;
        btn.disabled = on;
        if (on) { btn.setAttribute('data-orig', btn.textContent); btn.textContent = '⏳ ...'; }
        else btn.textContent = btn.getAttribute('data-orig') || orig || btn.textContent;
      }

      /* ── React setState shim ──
         Fiber'dan dispatch fonksiyonunu alıp hook'u güncelliyoruz */
      function setReactState(fiber, hookIndex, newValue) {
        let hook = fiber.memoizedState;
        let i = 0;
        while (hook && i < hookIndex) { hook = hook.next; i++; }
        if (hook && hook.queue && hook.queue.dispatch) {
          hook.queue.dispatch(newValue);
          return true;
        }
        return false;
      }

      /* ════════════════════════════════════════════════════════════════
         PROJE PANELİ — Sol paneldeki "Yeni" butonunu izle
      ═══════════════════════════════════════════════════════════════ */

      /* API'den projeleri yükle */
      async function loadProjectsFromAPI() {
        try {
          const projects = await apiFetch(`${API}/projects`);
          if (projects && projects.length > 0) {
            window.__ta_api_projects = projects;
          }
        } catch(e) {
          console.warn('[TA] Proje yüklenemedi:', e.message);
        }
      }

      /* ════════════════════════════════════════════════════════════════
         BUTTON DELEGATION — Tüm TA butonlarını yakala
      ═══════════════════════════════════════════════════════════════ */

      let _analyzeBtnText = '🔍 Analiz Et';
      let _runBtnText = '▶ Çalıştır';
      let _regBtnText = '▶ Regresyon Koş';
      let _docContext = null; /* analiz sonucu sakla */
      let _genTestsResult = null;

      document.addEventListener('click', async function(e) {
        const btn = e.target.closest('button');
        if (!btn) return;
        const txt = btn.textContent.trim();

        /* ── Örnek Doküman Yükle ── */
        if (txt.includes('Örnek Doküman')) {
          e.stopImmediatePropagation();
          spin(btn, true);
          try {
            const data = await apiFetch(`${API}/analyze-example`);
            /* textarea'yı bul */
            const ta = document.querySelector('textarea[placeholder*="Doküman"]');
            if (ta) {
              Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype,'value')
                .set.call(ta, data.content);
              ta.dispatchEvent(new Event('input', {bubbles:true}));
              toast('Örnek doküman yüklendi', 'success');
            }
          } catch(err) { toast('Örnek yüklenemedi: ' + err.message, 'error'); }
          spin(btn, false);
          return;
        }

        /* ── Analiz Et ── */
        if (txt === '🔍 Analiz Et' || txt === _analyzeBtnText) {
          const ta = document.querySelector('textarea[placeholder*="Doküman"]');
          const docText = ta ? ta.value.trim() : '';
          if (!docText) { toast('Önce doküman yükleyin', 'warning'); return; }
          spin(btn, true, '🔍 Analiz Et');
          try {
            const result = await apiFetch(`${API}/analyze-document`, {
              method: 'POST',
              body: JSON.stringify({ content: docText, document_name: 'document.txt' })
            });
            _docContext = result;
            /* Sonuçları göster */
            let container = document.getElementById('ta-api-results');
            if (!container) {
              container = document.createElement('div');
              container.id = 'ta-api-results';
              container.style.cssText = 'margin-top:12px;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px;font-size:12px;color:#cbd5e1;';
              btn.parentElement.parentElement.appendChild(container);
            }
            const reqs = result.requirements || [];
            container.innerHTML = `<div style="font-weight:700;color:#94a3b8;margin-bottom:8px;">📊 ${reqs.length} gereksinim analiz edildi — Kapsam: ${result.coverage_score || 0}%</div>
            <table style="width:100%;border-collapse:collapse;font-size:11px;">
              <thead><tr style="color:#64748b;border-bottom:1px solid rgba(255,255,255,0.1);">
                <th style="padding:4px 8px;text-align:left">ID</th>
                <th style="padding:4px 8px;text-align:left">Gereksinim</th>
                <th style="padding:4px 8px;text-align:left">Tür</th>
                <th style="padding:4px 8px;text-align:left">Öncelik</th>
              </tr></thead>
              <tbody>
                ${reqs.map(r => `<tr style="border-bottom:1px solid rgba(255,255,255,0.04);">
                  <td style="padding:4px 8px;color:#a78bfa;font-family:monospace">${r.id}</td>
                  <td style="padding:4px 8px;max-width:300px">${r.title || r.description || ''}</td>
                  <td style="padding:4px 8px"><span style="font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(59,130,246,0.2);color:#93c5fd">${r.type||'—'}</span></td>
                  <td style="padding:4px 8px"><span style="font-size:10px;padding:2px 6px;border-radius:4px;background:${r.priority==='high'||r.priority==='P1'?'rgba(239,68,68,0.2)':'rgba(245,158,11,0.2)'};color:${r.priority==='high'||r.priority==='P1'?'#fca5a5':'#fcd34d'}">${r.priority||'—'}</span></td>
                </tr>`).join('')}
              </tbody>
            </table>`;
            toast(`${reqs.length} gereksinim analiz edildi`, 'success');
          } catch(err) { toast('Analiz hatası: ' + err.message, 'error'); }
          spin(btn, false, '🔍 Analiz Et');
          return;
        }

        /* ── Manuel Test Üret ── */
        if (txt.includes('Manuel Test Üret')) {
          if (!_docContext) { toast('Önce analiz edin', 'warning'); return; }
          spin(btn, true);
          try {
            const reqs = (_docContext.requirements || []).map(r => ({
              id: r.id, text: r.title || r.description || ''
            }));
            const result = await apiFetch(`${API}/generate-tests`, {
              method: 'POST',
              body: JSON.stringify({ requirements: reqs })
            });
            _genTestsResult = result;
            const cases = result.test_cases || [];
            let container = document.getElementById('ta-gen-tests-results');
            if (!container) {
              container = document.createElement('div');
              container.id = 'ta-gen-tests-results';
              container.style.cssText = 'margin-top:10px;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px;font-size:12px;color:#cbd5e1;';
              btn.parentElement.parentElement.appendChild(container);
            }
            container.innerHTML = `<div style="font-weight:700;color:#94a3b8;margin-bottom:8px;">📋 ${cases.length} test case üretildi</div>
            <div style="display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto;">
              ${cases.map(tc => `<div style="display:flex;justify-content:space-between;padding:5px 8px;background:rgba(255,255,255,0.03);border-radius:6px;">
                <span style="font-family:monospace;color:#a78bfa;font-size:10px">${tc.id}</span>
                <span style="flex:1;margin:0 8px;font-size:11px">${tc.title}</span>
                <span style="font-size:10px;padding:1px 5px;border-radius:4px;background:${tc.priority==='P1'?'rgba(239,68,68,0.2)':'rgba(245,158,11,0.2)'};color:${tc.priority==='P1'?'#fca5a5':'#fcd34d'}">${tc.priority||''}</span>
              </div>`).join('')}
            </div>`;
            toast(`${cases.length} test case üretildi`, 'success');
          } catch(err) { toast('Test üretim hatası: ' + err.message, 'error'); }
          spin(btn, false);
          return;
        }

        /* ── Otomasyon Kodu Üret ── */
        if (txt.includes('Otomasyon Kodu Üret')) {
          if (!_docContext) { toast('Önce analiz edin', 'warning'); return; }
          spin(btn, true);
          try {
            const reqs = _docContext.requirements || [];
            const firstReq = reqs[0] || {};
            const result = await apiFetch(`${API}/generate-automation`, {
              method: 'POST',
              body: JSON.stringify({
                test_case: {
                  id: firstReq.id || 'TC-001',
                  title: firstReq.title || firstReq.description || 'Doküman Test',
                  steps: (firstReq.acceptance_criteria || []).map((s,i) => ({action: s}))
                },
                framework: 'playwright'
              })
            });
            /* Mevcut kod alanını bul */
            const codeArea = document.querySelector('textarea[readonly]');
            if (codeArea) {
              Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype,'value')
                .set.call(codeArea, result.code || '# Kod üretilemedi');
              codeArea.dispatchEvent(new Event('input', {bubbles:true}));
            } else {
              let container = document.getElementById('ta-autocode');
              if (!container) {
                container = document.createElement('div');
                container.id = 'ta-autocode';
                container.style.cssText = 'margin-top:10px;';
                btn.parentElement.parentElement.appendChild(container);
              }
              container.innerHTML = `<div style="font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:6px;">⚙️ Üretilen Playwright Kodu</div>
              <textarea readonly style="width:100%;height:200px;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px;font-size:11px;color:#79c0ff;font-family:monospace;resize:none;box-sizing:border-box;">${result.code || ''}</textarea>`;
            }
            toast('Otomasyon kodu üretildi', 'success');
          } catch(err) { toast('Kod üretim hatası: ' + err.message, 'error'); }
          spin(btn, false);
          return;
        }

        /* ── Senaryo Kaydet (Manuel Test) ── */
        if (txt === '💾 Kaydet') {
          const inputs = btn.closest('div[style*="flex-direction:column"]')?.querySelectorAll('input,textarea,select');
          if (!inputs || inputs.length < 2) return;
          /* Sadece görünür, aktif form varsa çalış */
          const firstInput = inputs[0];
          if (!firstInput.value.trim()) return; /* name zorunlu, değilse React handler devralır */
          spin(btn, true);
          try {
            const testData = {
              name: inputs[0]?.value || '',
              precond: inputs[1]?.value || '',
              steps: inputs[2]?.value || '',
              expected: inputs[3]?.value || '',
              priority: inputs[4]?.value || 'P2',
            };
            await apiFetch(`${API}/manual-test`, {
              method: 'POST',
              body: JSON.stringify({
                title: testData.name,
                steps: testData.steps,
                module: '',
                precondition: testData.precond,
                expected: testData.expected,
                priority: testData.priority,
              })
            });
            toast('Test case API\'ye kaydedildi', 'success');
          } catch(err) { console.warn('[TA] Manuel test kayıt hatası:', err.message); }
          spin(btn, false);
          /* React handler devam etsin — return yok */
          return;
        }

        /* ── Çalıştır (Otomasyon) ── */
        if (txt === '▶ Çalıştır' || txt === _runBtnText) {
          spin(btn, true, '▶ Çalıştır');
          try {
            /* Seçili otomasyon dosyasından test case al */
            const selected = document.querySelector('button[style*="rgba(139,92,246,0.3)"]');
            const title = selected ? selected.querySelector('div')?.textContent : 'Otomasyon Test';
            const result = await apiFetch(`${API}/execute`, {
              method: 'POST',
              body: JSON.stringify({
                test_cases: [{ id: 'AUTO-001', title: title || 'Otomasyon Test' }],
                suite_name: 'Otomasyon Suite'
              })
            });
            /* Konsol outputunu güncelle */
            const pre = document.querySelector('pre');
            if (pre && result.results) {
              const lines = result.results.map(r =>
                `[${r.status === 'pass' ? 'PASS' : 'FAIL'}] ${r.title} — ${r.duration}s`
              ).join('\n');
              pre.textContent = `$ Test çalıştırıldı\n${lines}\n\n✓ Toplam: ${result.total} | Geçti: ${result.passed} | Başarısız: ${result.failed}`;
            }
            toast(`Test tamamlandı: ${result.passed}/${result.total} geçti`, result.failed === 0 ? 'success' : 'warning');
          } catch(err) { toast('Çalıştırma hatası: ' + err.message, 'error'); }
          spin(btn, false, '▶ Çalıştır');
          return;
        }

        /* ── Regresyon Koş ── */
        if (txt.includes('Regresyon Koş') || txt === _regBtnText) {
          spin(btn, true, '▶ Regresyon Koş');
          try {
            /* Seçili testleri topla */
            const checked = [...document.querySelectorAll('input[type="checkbox"]:checked')];
            const testCases = checked.map((cb, i) => {
              const label = cb.closest('label');
              const text = label ? label.textContent.trim() : `TC-${i+1:03}`;
              const parts = text.split('—');
              return { id: parts[0]?.trim() || `TC-${i+1}`, title: parts[1]?.trim() || text };
            });
            const result = await apiFetch(`${API}/execute-regression`, {
              method: 'POST',
              body: JSON.stringify({ test_cases: testCases, suite_name: 'Regression Suite' })
            });
            /* Geçmişi güncelle */
            await refreshRegressionHistory();
            toast(`Regresyon tamamlandı: ${result.passed}/${result.total} geçti`, result.failed === 0 ? 'success' : 'warning');
          } catch(err) { toast('Regresyon hatası: ' + err.message, 'error'); }
          spin(btn, false, '▶ Regresyon Koş');
          return;
        }

      }, true); /* capture phase */

      /* ── Regresyon geçmişini yenile ── */
      async function refreshRegressionHistory() {
        try {
          const history = await apiFetch(`${API}/execution-history`);
          const dashboard = await apiFetch(`${API}/report/dashboard`);
          window.__ta_reg_history = history;
          window.__ta_dashboard = dashboard;
          /* Geçmiş tablosunu güncelle */
          const tbody = document.querySelector('table tbody');
          if (tbody && history.length > 0) {
            const rows = history.map(h => {
              const rate = h.total > 0 ? Math.round(h.passed / h.total * 100) : 0;
              return `<tr style="border-bottom:1px solid rgba(255,255,255,0.04);color:#cbd5e1;">
                <td style="padding:5px 8px">${(h.timestamp||'').substring(0,10)}</td>
                <td style="padding:5px 8px">${h.suite_name||'—'}</td>
                <td style="padding:5px 8px">${h.total||0}</td>
                <td style="padding:5px 8px;color:#34d399">${h.passed||0}</td>
                <td style="padding:5px 8px;color:#f87171">${h.failed||0}</td>
                <td style="padding:5px 8px">
                  <span style="font-size:10px;color:${rate>=90?'#34d399':rate>=75?'#fbbf24':'#f87171'};font-weight:600">${rate}%</span>
                </td>
                <td style="padding:5px 8px;color:#64748b">${h.duration||0}s</td>
              </tr>`;
            });
            tbody.innerHTML = rows.join('');
          }
        } catch(e) { console.warn('[TA] Geçmiş yüklenemedi:', e.message); }
      }

      /* ── İlk yüklemede projeleri API'den al ── */
      window.addEventListener('load', async () => {
        await loadProjectsFromAPI();
      });

      console.log('[TA] API integration patch yüklendi ✓');

    })();
    </script>

<script>

  insights: async () => {

  listProjects: async () => {

  },
  health: async () => {
    const r = await fetch(TP_API + '/health');
    return r.json();
  }
};
console.log('Test Platform API client loaded');
</script>
