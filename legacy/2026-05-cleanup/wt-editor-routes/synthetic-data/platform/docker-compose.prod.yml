version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synthbank-app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=SyntheticBankData
      - VERSION=1.0.0
      - ENVIRONMENT=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=synthbank_db
      - DB_USER=synthbank_user
      - DB_PASSWORD=${DB_PASSWORD:-SecurePassword123!}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
      - LLM_API_KEY=${LLM_API_KEY:-sk-your-api-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs
      - ./static:/app/static:ro
    networks:
      - synthbank-network
    resources:
      limits:
        cpus: '1'
        memory: 1G
      reservations:
        cpus: '0.5'
        memory: 512M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: synthbank-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/cert.pem:/etc/nginx/ssl/cert.pem:ro
      - ./certs/key.pem:/etc/nginx/ssl/key.pem:ro
      - ./static:/app/static:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - synthbank-network
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        cpus: '0.25'
        memory: 128M

  postgres:
    image: postgres:15-alpine
    container_name: synthbank-postgres
    restart: always
    environment:
      - POSTGRES_DB=synthbank_db
      - POSTGRES_USER=synthbank_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-SecurePassword123!}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synthbank_user -d synthbank_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - synthbank-network
    resources:
      limits:
        cpus: '2'
        memory: 1G
      reservations:
        cpus: '1'
        memory: 512M

  redis:
    image: redis:7-alpine
    container_name: synthbank-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-RedisPass123!}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - synthbank-network
    resources:
      limits:
        cpus: '1'
        memory: 512M
      reservations:
        cpus: '0.5'
        memory: 256M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  synthbank-network:
    driver: bridge
