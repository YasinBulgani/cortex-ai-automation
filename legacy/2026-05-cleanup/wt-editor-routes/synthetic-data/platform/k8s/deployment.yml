apiVersion: apps/v1
kind: Deployment
metadata:
  name: synthbank-app
  namespace: syntheticbank
  labels:
    app: synthbank-app
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: synthbank-app
  template:
    metadata:
      labels:
        app: synthbank-app
        version: v1
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: app
        image: synthbank-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: synthbank-config
              key: APP_NAME
        - name: VERSION
          valueFrom:
            configMapKeyRef:
              name: synthbank-config
              key: VERSION
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: synthbank-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: synthbank-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: synthbank-config
              key: DB_NAME
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: synthbank-config
              key: REDIS_URL
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: synthbank-config
              key: LOG_LEVEL
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: synthbank-secret
              key: DB_PASSWORD
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: synthbank-secret
              key: LLM_API_KEY
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: synthbank-secret
              key: JWT_SECRET
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          limits:
            cpu: "1000m"
            memory: "512Mi"
          requests:
            cpu: "500m"
            memory: "256Mi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      restartPolicy: Always
