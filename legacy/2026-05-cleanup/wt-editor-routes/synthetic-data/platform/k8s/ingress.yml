apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: synthbank-ingress
  namespace: syntheticbank
  labels:
    app: synthbank-app
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - synthbank.example.com
    secretName: synthbank-tls-cert
  rules:
  - host: synthbank.example.com
    http:
      paths:
      - path: /api/v1/auth
        pathType: Prefix
        backend:
          service:
            name: synthbank-service
            port:
              number: 80
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: synthbank-service
            port:
              number: 80
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: synthbank-service
            port:
              number: 80
      - path: /static
        pathType: Prefix
        backend:
          service:
            name: synthbank-service
            port:
              number: 80
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: synthbank-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: synthbank-service
            port:
              number: 80
