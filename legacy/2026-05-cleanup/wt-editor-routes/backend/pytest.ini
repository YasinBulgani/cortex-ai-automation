[pytest]
pythonpath = .
# `tests/` ana test suite; `app/domains/agents/v2/tests/` domain-local
# birim testleri içerir (Gherkin parser, AI gateway, locator pipeline, run
# store). Testpaths'e eklenmeden pytest onları hiç keşfetmiyordu.
testpaths =
    tests
    app/domains/agents/v2/tests
filterwarnings =
    ignore::DeprecationWarning

addopts =
    --tb=short
    -v
    --strict-markers

markers =
    smoke: Hızlı sağlık kontrolü testleri (health, ready, auth temel)
    service: API servis katmanı testleri (CRUD, validasyon)
    regression: Regresyon testleri (schema, dataset, version)
    integration: Entegrasyon testleri (DB + seed gerektiren)
    slow: Yavaş testler (AI, büyük dataset)
    critical: Kritik BDD senaryoları
    high: Yüksek öncelikli BDD senaryoları
    medium: Orta öncelikli BDD senaryoları
    pozitif: Pozitif akış BDD senaryoları
    negatif: Negatif akış BDD senaryoları
    boundary: Sınır durum BDD senaryoları
    P1: Kritik öncelik
    P2: Normal öncelik
    P3: Düşük öncelik
    critical: BDD kritik senaryo tag'i
    high: BDD yüksek öncelik tag'i
    medium: BDD orta öncelik tag'i
    boundary: BDD sınır-değer tag'i
    pozitif: BDD pozitif senaryo tag'i
    negatif: BDD negatif senaryo tag'i
