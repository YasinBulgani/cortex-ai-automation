apiVersion: v1
kind: ConfigMap
metadata:
  name: synthbank-config
  namespace: syntheticbank
  labels:
    app: synthbank-app
data:
  APP_NAME: "SyntheticBankData"
  VERSION: "1.0.0"
  ENVIRONMENT: "production"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "synthbank_db"
  REDIS_URL: "redis://redis:6379/0"
  LOG_LEVEL: "INFO"
  API_TITLE: "SyntheticBankData API"
  API_VERSION: "1.0.0"
  API_DESCRIPTION: "Turkish banking synthetic data platform"
  CORS_ORIGINS: "https://synthbank.example.com,https://app.synthbank.example.com"
  MAX_CONNECTIONS: "20"
  MIN_CONNECTIONS: "5"
  POOL_RECYCLE: "3600"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRY_MINUTES: "30"
  REFRESH_TOKEN_EXPIRY_DAYS: "7"
