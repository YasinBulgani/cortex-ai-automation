# ═══════════════════════════════════════════════════════════════════════════════
# BGTS / Nexus QA — Production Docker Compose
#
# Kullanım:
#   docker compose -f docker-compose.prod.yml up -d
#
# Ön koşullar:
#   1. .env dosyası oluşturulmuş ve CHANGEME değerleri doldurulmuş olmalı
#   2. SSL sertifikası: ./infra/ssl/cert.pem ve ./infra/ssl/key.pem mevcut olmalı
#      (Let's Encrypt: certbot certonly --standalone -d bgtest.dev)
#   3. Sağlıklı başlatma: docker compose -f docker-compose.prod.yml up -d postgres redis
#      ardından: docker compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─── Altyapı ─────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bgts_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    # Prod'da port dışarıya açılmaz — yalnızca iç ağ
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bgts_internal

  redis:
    image: redis:7-alpine
    container_name: bgts_redis_prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG; else redis-cli ping | grep PONG; fi",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bgts_internal

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:?GITHUB_REPOSITORY env var gerekli}-backend:${IMAGE_TAG:?IMAGE_TAG env var gerekli — latest kullanma, immutable tag gir}
    container_name: bgts_backend_prod
    restart: always
    expose:
      - "8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ARTIFACTS_DIR: /app/data/artifacts
      AI_WORKFLOW_ARTIFACT_RETENTION_DAYS: ${AI_WORKFLOW_ARTIFACT_RETENTION_DAYS:-30}
      AI_RQ_QUEUE_NAME: ${AI_RQ_QUEUE_NAME:-ai_workflows}
      AGENTS_V2_RUN_STORE: postgres
      AGENTS_V2_QUEUE_BACKEND: rq
      AGENTS_V2_SANDBOX_MODE: required
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENGINE_BASE_URL: http://engine:5001
      ENGINE_INTERNAL_KEY: ${ENGINE_INTERNAL_KEY}
      AI_GATEWAY_BASE_URL: http://ai-gateway:8080
      GATEWAY_INTERNAL_KEY: ${GATEWAY_INTERNAL_KEY}
      AI_GATEWAY_REQUIRED: "true"
      AI_BUDGET_PREFLIGHT_REQUIRED: "true"
      AI_STRUCTURED_OUTPUT_FAIL_CLOSED: "true"
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama}
      OLLAMA_MODEL_ANALYST: ${OLLAMA_MODEL_ANALYST:-qwen2.5:14b}
      OLLAMA_MODEL_FAST: ${OLLAMA_MODEL_FAST:-llama3.1:8b}
      OLLAMA_MODEL_CODER: ${OLLAMA_MODEL_CODER:-qwen2.5-coder:7b}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}
      DEBUG: "false"
      RUNNING_IN_DOCKER: "1"
      RATE_LIMIT_REQUIRED: "true"
      REDIS_REQUIRED: "true"
      AUTH_STATE_REDIS_REQUIRED: "true"
      LLM_RATE_LIMIT_REDIS_REQUIRED: "true"
      CICD_REQUIRE_WEBHOOK_SECRETS: "true"
      N8N_REQUIRE_CALLBACK_SECRET: "true"
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GITLAB_WEBHOOK_TOKEN: ${GITLAB_WEBHOOK_TOKEN}
      JENKINS_WEBHOOK_TOKEN: ${JENKINS_WEBHOOK_TOKEN}
      N8N_CALLBACK_TOKEN: ${N8N_CALLBACK_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - bgts_internal
    volumes:
      - backend_artifacts_prod:/app/data/artifacts
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # ─── RQ Worker ───────────────────────────────────────────────────────────────
  worker:
    image: ghcr.io/${GITHUB_REPOSITORY:?GITHUB_REPOSITORY env var gerekli}-backend:${IMAGE_TAG:?IMAGE_TAG env var gerekli — latest kullanma, immutable tag gir}
    container_name: bgts_worker_prod
    restart: always
    command: ["sh", "-c", "rq worker -u $$REDIS_URL $$RQ_QUEUE_NAME"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ARTIFACTS_DIR: /app/data/artifacts
      RQ_QUEUE_NAME: syndata_jobs
      ENGINE_BASE_URL: http://engine:5001
      ENGINE_INTERNAL_KEY: ${ENGINE_INTERNAL_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bgts_internal
    volumes:
      - backend_artifacts_prod:/app/data/artifacts
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  ai-worker:
    image: ghcr.io/${GITHUB_REPOSITORY:?GITHUB_REPOSITORY env var gerekli}-backend:${IMAGE_TAG:?IMAGE_TAG env var gerekli — latest kullanma, immutable tag gir}
    container_name: bgts_ai_worker_prod
    restart: always
    command: ["sh", "-c", "rq worker -u $$REDIS_URL $$AI_RQ_QUEUE_NAME"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ARTIFACTS_DIR: /app/data/artifacts
      AI_WORKFLOW_ARTIFACT_RETENTION_DAYS: ${AI_WORKFLOW_ARTIFACT_RETENTION_DAYS:-30}
      AI_RQ_QUEUE_NAME: ${AI_RQ_QUEUE_NAME:-ai_workflows}
      AGENTS_V2_RUN_STORE: postgres
      AGENTS_V2_QUEUE_BACKEND: rq
      AGENTS_V2_SANDBOX_MODE: required
      JWT_SECRET: ${JWT_SECRET}
      ENGINE_BASE_URL: http://engine:5001
      ENGINE_INTERNAL_KEY: ${ENGINE_INTERNAL_KEY}
      AI_GATEWAY_BASE_URL: http://ai-gateway:8080
      GATEWAY_INTERNAL_KEY: ${GATEWAY_INTERNAL_KEY}
      AI_GATEWAY_REQUIRED: "true"
      AI_BUDGET_PREFLIGHT_REQUIRED: "true"
      AI_STRUCTURED_OUTPUT_FAIL_CLOSED: "true"
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama}
      OLLAMA_MODEL_ANALYST: ${OLLAMA_MODEL_ANALYST:-qwen2.5:14b}
      OLLAMA_MODEL_FAST: ${OLLAMA_MODEL_FAST:-llama3.1:8b}
      OLLAMA_MODEL_CODER: ${OLLAMA_MODEL_CODER:-qwen2.5-coder:7b}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SKIP_APP_BOOTSTRAP: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    networks:
      - bgts_internal
    volumes:
      - backend_artifacts_prod:/app/data/artifacts
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # ─── Engine ──────────────────────────────────────────────────────────────────
  engine:
    image: ghcr.io/${GITHUB_REPOSITORY:?GITHUB_REPOSITORY env var gerekli}-engine:${IMAGE_TAG:?IMAGE_TAG env var gerekli — latest kullanma, immutable tag gir}
    container_name: bgts_engine_prod
    restart: always
    expose:
      - "5001"
    environment:
      APP_ENV: ${APP_ENV:-production}
      ENGINE_PORT: "5001"
      ENGINE_DEBUG: "0"
      ENGINE_SECRET_KEY: ${ENGINE_SECRET_KEY}
      HEADLESS: "true"
      BROWSER: chromium
      ENGINE_INTERNAL_KEY: ${ENGINE_INTERNAL_KEY}
      ENGINE_LLM_USE_GATEWAY: "1"
      ENGINE_LLM_ALLOW_DIRECT_PROVIDERS: "0"
      AI_GATEWAY_BASE_URL: http://ai-gateway:8080
      GATEWAY_INTERNAL_KEY: ${GATEWAY_INTERNAL_KEY}
      ENGINE_CORS_ORIGINS: ${ENGINE_CORS_ORIGINS}
      WEBHOOK_REQUIRE_SECRETS: "true"
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GITLAB_WEBHOOK_TOKEN: ${GITLAB_WEBHOOK_TOKEN}
      GENERIC_WEBHOOK_TOKEN: ${GENERIC_WEBHOOK_TOKEN}
      MOBILE_ARTIFACTS_DIR: "/app/mobile_uploads"
      BROWSERSTACK_USERNAME: ${BROWSERSTACK_USERNAME:-}
      BROWSERSTACK_ACCESS_KEY: ${BROWSERSTACK_ACCESS_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - engine_data_prod:/app/reports
      - engine_screenshots_prod:/app/screenshots
      - engine_mobile_uploads_prod:/app/mobile_uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - bgts_internal
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  web:
    image: ghcr.io/${GITHUB_REPOSITORY:?GITHUB_REPOSITORY env var gerekli}-web:${IMAGE_TAG:?IMAGE_TAG env var gerekli — latest kullanma, immutable tag gir}
    container_name: bgts_web_prod
    restart: always
    expose:
      - "3000"
    environment:
      # Blank API base keeps browser calls same-origin so Nginx can route `/api/v1/*`.
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
      # Engine access should stay on the authenticated backend proxy path.
      NEXT_PUBLIC_ENGINE_BASE: ${NEXT_PUBLIC_ENGINE_BASE:-/api/v1/automation/proxy}
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bgts_internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ─── AI Gateway ───────────────────────────────────────────────────────────────
  ai-gateway:
    image: ghcr.io/${GITHUB_REPOSITORY:?GITHUB_REPOSITORY env var gerekli}-ai-gateway:${IMAGE_TAG:?IMAGE_TAG env var gerekli — latest kullanma, immutable tag gir}
    container_name: nexusqa_ai_gateway_prod
    restart: always
    expose:
      - "8080"
    environment:
      APP_ENV: ${APP_ENV:-production}
      PORT: "8080"
      DEBUG: "false"
      INTERNAL_KEY: ${GATEWAY_INTERNAL_KEY}
      REDIS_URL: ${REDIS_URL}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_ENABLED: ${GROQ_ENABLED:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_ENABLED: ${GEMINI_ENABLED:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
      OLLAMA_MODEL_ANALYST: ${OLLAMA_MODEL_ANALYST:-qwen2.5:14b}
      OLLAMA_MODEL_FAST: ${OLLAMA_MODEL_FAST:-llama3.1:8b}
      OLLAMA_MODEL_CODER: ${OLLAMA_MODEL_CODER:-qwen2.5-coder:7b}
      G4F_ENABLED: ${G4F_ENABLED:-false}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - bgts_internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ─── Nginx (SSL Termination + Reverse Proxy) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: bgts_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - web
      - backend
      - engine
      - ai-gateway
    networks:
      - bgts_internal
      - bgts_external
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ─── Prometheus (Metrik Toplama) ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: bgts_prometheus
    restart: always
    expose:
      - "9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - bgts_internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: bgts_alertmanager
    restart: always
    expose:
      - "9093"
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-}
    volumes:
      - ./infra/alertmanager/alertmanager.noop.yml:/etc/alertmanager/alertmanager.noop.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$$ALERTMANAGER_WEBHOOK_URL" ]; then
          cat > /tmp/alertmanager.yml <<EOF
        global:
          resolve_timeout: 5m
        route:
          group_by: ['alertname', 'service', 'severity']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: webhook
        receivers:
          - name: webhook
            webhook_configs:
              - url: "$$ALERTMANAGER_WEBHOOK_URL"
                send_resolved: true
        EOF
        else
          cp /etc/alertmanager/alertmanager.noop.yml /tmp/alertmanager.yml
        fi
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    depends_on:
      - prometheus
    networks:
      - bgts_internal
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ─── Grafana (Dashboard) ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: bgts_grafana
    restart: always
    expose:
      - "3001"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - bgts_internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: bgts_postgres_exporter
    restart: always
    environment:
      DATA_SOURCE_URI: postgres:5432/${POSTGRES_DB}?sslmode=disable
      DATA_SOURCE_USER: ${POSTGRES_USER}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "9187"
    networks:
      - bgts_internal
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: bgts_redis_exporter
    restart: always
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "9121"
    networks:
      - bgts_internal
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: bgts_nginx_exporter
    restart: always
    command:
      - -nginx.scrape-uri=http://nginx:8080/nginx_status
    depends_on:
      - nginx
    expose:
      - "9113"
    networks:
      - bgts_internal
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

networks:
  bgts_internal:
    # Internal uygulama trafiği bu ağda kalır; container port publish edilmediği için
    # servisler yine doğrudan dışarı açılmaz, ancak dış servis çıkışları (LLM, Sentry vb.)
    # çalışabilsin diye egress kapatılmaz.
    driver: bridge
  bgts_external:
    driver: bridge   # Nginx bu ağ üzerinden dışarıya açılır

volumes:
  pgdata_prod:
    driver: local
  backend_artifacts_prod:
    driver: local
  redis_data_prod:
    driver: local
  engine_data_prod:
    driver: local
  engine_screenshots_prod:
    driver: local
  engine_mobile_uploads_prod:
    driver: local
  nginx_cache:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local
