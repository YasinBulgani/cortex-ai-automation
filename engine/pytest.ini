[pytest]
bdd_features_base_dir = features/
pythonpath = .
# 'steps/' BDD step tanımları — testpaths'a eklemek conftest'i hem modül yolu
# hem paket yolu üzerinden çifte kaydettiği için pluggy çatışması üretiyordu.
# tests/conftest.py zaten pytest_plugins ile steps.conftest'i yüklüyor.
testpaths = tests
norecursedirs = tests/wizard .git __pycache__ node_modules

asyncio_mode = auto

timeout = 300

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

addopts =
    --tb=short
    -v
    --strict-markers

markers =
    e2e: Uctan uca (end-to-end) testleri
    functional: Fonksiyonel testler
    P0: Oncelik 0 — blokleyici
    smoke: Smoke testleri (hizli, temel islevsellik)
    regression: Regresyon testleri (mevcut islevsellik dogrulama)
    ai: AI motor testleri (OPENAI_API_KEY gerektirir)
    integration: Entegrasyon testleri (tam stack)
    bdd: BDD feature testleri
    browser: Tarayici gerektiren testler
    unit: Birim testleri
    slow: Yavas testler (>30s)
    P1: Oncelik 1 — kritik
    P2: Oncelik 2 — normal
    P3: Oncelik 3 — dusuk
    ui: UI (Playwright) testleri
    api: API (httpx/REST) testleri
    critical: Kritik oncelik (test basarisizsa deploy engellenir)
    high: Yuksek oncelik
    medium: Orta oncelik
    low: Dusuk oncelik
    positive: Pozitif senaryo (basarili akis)
    negative: Negatif senaryo (hata durumu)
    boundary: Sinir degeri testi
    exception: Istisna durumu testi
    login: Login feature testleri
    projects: Proje yonetimi testleri
    scenarios: Senaryo yonetimi testleri
    approvals: Onay kuyrugu testleri
    executions: Test kosu testleri
    analytics: Analitik testleri
    flows: Akis editoru testleri
    requirements: Gereksinim testleri
    coverage: Kapsam matrisi testleri
    schedules: Zamanlama testleri
    test_data: Test verisi yonetimi testleri (tireli: test-data)
    integrations: Entegrasyon kayitlari testleri
    api_tests: API test koleksiyonu testleri (tireli: api-tests)
    members: Proje uyeleri testleri
    dashboard: Dashboard testleri
    security: Guvenlik testleri (SQL injection, XSS, auth bypass)
