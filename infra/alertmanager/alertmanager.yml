# Neurex QA — Alertmanager configuration
# Critical alerts: PagerDuty / Slack; non-critical: Slack only.
# Override in production via ALERTMANAGER_* env vars or mount a secret.

global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL:-}"  # set in prod env

route:
  group_by: [alertname, service, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: default
  routes:
    # P0 — page immediately
    - match:
        severity: critical
      receiver: pagerduty-critical
      continue: true
    # All alerts → Slack
    - match_re:
        severity: "critical|warning|info"
      receiver: slack-neurex

receivers:
  - name: default
    slack_configs:
      - channel: "#neurex-alerts"
        send_resolved: true
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Service:* {{ .Labels.service }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

  - name: slack-neurex
    slack_configs:
      - channel: "#neurex-alerts"
        send_resolved: true
        api_url: "${SLACK_WEBHOOK_URL:-}"
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Service:* {{ .Labels.service }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          {{ end }}

  - name: pagerduty-critical
    pagerduty_configs:
      - service_key: "${PAGERDUTY_SERVICE_KEY:-}"
        description: "{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.summary }}"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, service]
