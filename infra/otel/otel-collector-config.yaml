receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Scrape Prometheus metrics from all services
  prometheus:
    config:
      scrape_configs:
        - job_name: neurex-backend
          static_configs:
            - targets: ["backend:8000"]
          metrics_path: /metrics
        - job_name: neurex-engine
          static_configs:
            - targets: ["engine:5001"]
          metrics_path: /metrics
        - job_name: neurex-ai-gateway
          static_configs:
            - targets: ["ai-gateway:8080"]
          metrics_path: /metrics
        - job_name: otel-collector
          static_configs:
            - targets: ["localhost:8888"]

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  memory_limiter:
    limit_mib: 512
    check_interval: 1s
  resource:
    attributes:
      - key: cluster
        value: neurex-local
        action: upsert

exporters:
  otlp/tempo:
    endpoint: tempo:9095
    tls:
      insecure: true

  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write

  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: false
      job: true

  logging:
    loglevel: warn

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/tempo, logging]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch, resource]
      exporters: [prometheusremotewrite, logging]
