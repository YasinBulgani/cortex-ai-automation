groups:
  - name: bgts-service-health
    rules:
      - alert: BgtsBackendDown
        expr: up{job="bgts-backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "BGTS backend is down"
          description: "Prometheus cannot scrape the FastAPI backend for 2 minutes."

      - alert: BgtsEngineDown
        expr: up{job="bgts-engine"} == 0
        for: 2m
        labels:
          severity: critical
          service: engine
        annotations:
          summary: "BGTS engine is down"
          description: "Prometheus cannot scrape the engine service for 2 minutes."

      - alert: BgtsAiGatewayDown
        expr: up{job="bgts-ai-gateway"} == 0
        for: 2m
        labels:
          severity: critical
          service: ai-gateway
        annotations:
          summary: "BGTS AI gateway is down"
          description: "Prometheus cannot scrape the AI gateway for 2 minutes."

      - alert: BgtsNginxExporterDown
        expr: up{job="nginx"} == 0
        for: 5m
        labels:
          severity: warning
          service: nginx
        annotations:
          summary: "Nginx exporter is down"
          description: "Nginx exporter has been unavailable for 5 minutes."

      - alert: BgtsRedisExporterDown
        expr: up{job="redis"} == 0
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis exporter is down"
          description: "Redis exporter has been unavailable for 5 minutes."

      - alert: BgtsPostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "Postgres exporter is down"
          description: "Postgres exporter has been unavailable for 5 minutes."

  - name: bgts-backend-performance
    rules:
      - alert: BgtsHigh5xxRate
        expr: |
          (
            sum(rate(http_requests_total{job="bgts-backend",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_requests_total{job="bgts-backend"}[5m])), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "BGTS backend 5xx rate is elevated"
          description: "More than 5% of backend requests are returning 5xx responses for 10 minutes."

      - alert: BgtsHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{job="bgts-backend"}[5m]))
          ) > 2
        for: 10m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "BGTS backend p95 latency is high"
          description: "Backend p95 latency has exceeded 2 seconds for 10 minutes."

  - name: bgts-ai-llm-workflows
    rules:
      - alert: BgtsAiWorkflowDeadLetters
        expr: |
          sum(increase(agent_v2_workflow_dead_letters_total[10m])) > 0
        for: 1m
        labels:
          severity: critical
          service: ai-workflows
        annotations:
          summary: "AI workflow dead-letter detected"
          description: "At least one AI workflow entered the dead-letter path in the last 10 minutes."

      - alert: BgtsAiWorkflowQueueBacklog
        expr: |
          max(agent_v2_workflow_queue_depth{queue_name="ai_workflows"}) > 50
        for: 10m
        labels:
          severity: warning
          service: ai-workflows
        annotations:
          summary: "AI workflow queue backlog is high"
          description: "The ai_workflows queue has more than 50 pending jobs for 10 minutes."

      - alert: BgtsAiWorkflowArtifactIntegrityFailure
        expr: |
          sum(increase(agent_v2_workflow_artifact_integrity_failures_total[10m])) > 0
        for: 1m
        labels:
          severity: critical
          service: ai-workflows
        annotations:
          summary: "AI workflow artifact integrity failure detected"
          description: "At least one registered AI workflow artifact failed SHA-256 verification before download."

      - alert: BgtsLlmSchemaViolationRateHigh
        expr: |
          (
            sum(rate(llm_schema_violations_total[5m]))
            /
            clamp_min(sum(rate(llm_requests_total[5m])), 0.001)
          ) > 0.02
        for: 10m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "LLM structured-output failure rate is high"
          description: "More than 2% of LLM requests are producing schema violations."

      - alert: BgtsLlmP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(llm_latency_seconds_bucket[5m]))
          ) > 30
        for: 10m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "LLM p95 latency is high"
          description: "LLM p95 latency has exceeded 30 seconds for 10 minutes."

      - alert: BgtsLlmBudgetNearLimit
        expr: |
          max(llm_budget_consumed_ratio{window=~"daily|monthly"}) > 0.9
        for: 5m
        labels:
          severity: warning
          service: ai-budget
        annotations:
          summary: "LLM budget is near its configured limit"
          description: "An LLM budget window has exceeded 90% consumption."

      - alert: BgtsLlmCostSpike
        expr: |
          sum(increase(llm_cost_usd_total[1h])) > 50
        for: 5m
        labels:
          severity: warning
          service: ai-budget
        annotations:
          summary: "LLM cost spike detected"
          description: "LLM spend increased by more than 50 USD in the last hour."
