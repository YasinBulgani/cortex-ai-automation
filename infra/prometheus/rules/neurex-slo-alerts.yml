groups:
  # ── API SLO: p99 latency ────────────────────────────────────────────────────
  - name: neurex-api-slo
    rules:
      - alert: BackendP99LatencyHigh
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{job=~"neurex-backend|bgts-backend"}[5m])) by (le)
          ) > 2.0
        for: 5m
        labels:
          severity: warning
          service: backend
          slo: latency
        annotations:
          summary: "Backend p99 latency > 2s"
          description: "Backend p99 latency is {{ $value | humanizeDuration }} (threshold: 2s)"

      - alert: BackendErrorRateHigh
        expr: |
          sum(rate(http_requests_total{job=~"neurex-backend|bgts-backend", status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job=~"neurex-backend|bgts-backend"}[5m]))
          > 0.01
        for: 5m
        labels:
          severity: critical
          service: backend
          slo: error_rate
        annotations:
          summary: "Backend HTTP 5xx error rate > 1%"
          description: "Backend error rate is {{ $value | humanizePercentage }} (threshold: 1%)"

      - alert: AIGatewayErrorRateHigh
        expr: |
          sum(rate(bgts_ai_gateway_http_requests_total{status=~"5.."}[5m]))
          /
          sum(rate(bgts_ai_gateway_http_requests_total[5m]))
          > 0.05
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
          slo: error_rate
        annotations:
          summary: "AI Gateway 5xx error rate > 5%"
          description: "AI gateway error rate is {{ $value | humanizePercentage }}"

  # ── DB / Redis health ────────────────────────────────────────────────────────
  - name: neurex-infra
    rules:
      - alert: PostgresConnectionPoolExhausted
        expr: |
          pg_stat_activity_count{state="active"} > 80
        for: 2m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "Postgres active connections > 80"
          description: "{{ $value }} active connections. Pool size is 20 + 10 overflow per instance."

      - alert: RedisMemoryUsageHigh
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory usage > 85%"
          description: "Redis is at {{ $value | humanizePercentage }} memory capacity"

  # ── Outbox relay lag ─────────────────────────────────────────────────────────
  - name: neurex-outbox
    rules:
      - alert: OutboxPendingEventsHigh
        expr: |
          neurex_outbox_pending_events_total > 1000
        for: 10m
        labels:
          severity: warning
          service: backend
          component: outbox
        annotations:
          summary: "Outbox relay lag: {{ $value }} pending events"
          description: "Outbox relay has not processed events for 10+ minutes. Check Redis connectivity."

  # ── AI provider fallbacks ────────────────────────────────────────────────────
  - name: neurex-ai-providers
    rules:
      - alert: AIProviderAllFailed
        expr: |
          sum(rate(bgts_ai_gateway_http_requests_total{status=~"5.."}[5m])) by (path)
          /
          sum(rate(bgts_ai_gateway_http_requests_total[5m])) by (path)
          == 1.0
        for: 2m
        labels:
          severity: critical
          service: ai-gateway
          component: provider-fallback
        annotations:
          summary: "All AI providers failing for {{ $labels.path }}"
          description: "100% error rate on AI gateway {{ $labels.path }} — all fallback providers exhausted"
