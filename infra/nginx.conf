# Nexus QA — Nginx Reverse Proxy Konfigürasyonu
# Tüm servisler testwright-ai.local domain'i üzerinden erişilebilir.
#
# /etc/hosts dosyasına ekle:
#   127.0.0.1  testwright-ai.local api.testwright-ai.local ai.testwright-ai.local

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream="$upstream_addr"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;  # Doküman yükleme için

    # ── Upstream Servisler ────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
    }

    upstream engine {
        server engine:5001;
    }

    upstream ai_gateway {
        server ai-gateway:8080;
        # Birden fazla instance açılırsa buraya ekle:
        # server ai-gateway-2:8080;
    }

    upstream frontend {
        server web:3000;
    }

    # ── testwright-ai.local — Ana Uygulama ────────────────────────────────────
    server {
        listen 80;
        server_name testwright-ai.local localhost;

        # Frontend (Next.js)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Backend API
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # AI Gateway
        location /ai/ {
            proxy_pass http://ai_gateway/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Test Engine
        location /engine/ {
            rewrite ^/engine/(.*)$ /$1 break;
            proxy_pass http://engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;  # Test execution uzun sürebilir
        }
    }

    # ── api.testwright-ai.local — Backend API ────────────────────────────────
    server {
        listen 80;
        server_name api.testwright-ai.local;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Swagger docs
        location /docs {
            proxy_pass http://backend/docs;
        }
    }

    # ── ai.testwright-ai.local — AI Gateway ──────────────────────────────────
    server {
        listen 80;
        server_name ai.testwright-ai.local;

        # Rate limiting (Nginx seviyesinde ek koruma)
        limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=30r/m;

        location / {
            limit_req zone=ai_limit burst=10 nodelay;
            proxy_pass http://ai_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Swagger docs
        location /docs {
            proxy_pass http://ai_gateway/docs;
        }
    }
}
