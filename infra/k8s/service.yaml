apiVersion: v1
kind: Service
metadata:
  name: testwright-ai-api-service
  labels:
    app: testwright-ai
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: testwright-ai-backend
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: api

---
apiVersion: v1
kind: Service
metadata:
  name: testwright-ai-web-service
  labels:
    app: testwright-ai
    tier: frontend
spec:
  type: NodePort
  selector:
    app: testwright-ai-frontend
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30000
    protocol: TCP
    name: web

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: testwright-ai-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: testwright-ai.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: testwright-ai-api-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: testwright-ai-web-service
            port:
              number: 80
