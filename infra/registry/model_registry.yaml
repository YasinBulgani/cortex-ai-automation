# ──────────────────────────────────────────────────────────────────────
# Aile (prefix) fiyatları — tag varyasyonları için fallback
# Bir model registry'de yoksa ama aile eşleşiyorsa bu satır kullanılır.
# ──────────────────────────────────────────────────────────────────────
families:
  - prefix: gpt-4o
    cost: {input: 2.50, output: 10.00}
    tier: mid
  - prefix: gpt-4.1
    cost: {input: 2.00, output: 8.00}
    tier: mid
  - prefix: claude-sonnet
    cost: {input: 3.00, output: 15.00}
