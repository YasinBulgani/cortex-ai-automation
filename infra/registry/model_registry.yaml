# TestwrightAI Model Registry — TEK KAYNAK
#
# Bu dosya tüm LLM modellerinin fiyat/özellik/tier bilgisini tutar.
# - backend/app/domains/ai/pricing.py bu dosyayı okur
# - engine/services/llm_gateway.py MODEL_COSTS bu dosyadan türetilir
# - backend/app/domains/agents/v2/tools/ai_gateway.py aynısı
# - backend/app/domains/ai/smart_model_router.py tier eşlemesi
#
# Yeni model eklemek: bu dosyaya satır + PR. Duplike kod düzenleme YOK.
#
# Güncelleme tarihi: 2026-Q2
# Fiyatlar USD / 1M token (provider liste fiyatı)

schema_version: 1

defaults:
  tier: mid
  supports_json: true
  supports_tools: true
  offline_safe: false
  status: prod   # prod | canary | archived

models:
  # ────────────────────────────────────────────────────────────────────
  # OpenAI
  # ────────────────────────────────────────────────────────────────────
  - id: gpt-4o
    provider: openai
    tier: mid
    context_window: 128000
    max_output: 16384
    cost: {input: 2.50, output: 10.00, cached_input: 1.25}
    supports_json: true
    supports_tools: true
    sla: {p95_ms: 3000}

  - id: gpt-4o-mini
    provider: openai
    tier: mini
    context_window: 128000
    max_output: 16384
    cost: {input: 0.15, output: 0.60, cached_input: 0.075}
